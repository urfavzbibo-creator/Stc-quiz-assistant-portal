    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0A0E23;
            color: #ffffff;
            transition: all 0.3s ease;
            margin: 0;
            padding: 0;
        }

        .bg-stc-purple { background-color: #4F008C !important; }
        .text-stc-purple { color: #4F008C !important; }
        .border-stc-purple { border-color: #4F008C !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #4F008C; border-radius: 10px; }

        .chat-container { height: calc(100vh - 160px); scroll-behavior: smooth; }
        
        .message { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ChatGPT style thinking dots */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            align-items: center;
            width: fit-content;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        /* Message formatting */
        .bot-response-text {
            line-height: 1.6;
            font-size: 1.1rem;
        }
        .bot-response-text strong {
            color: #D4AF37; /* Luxury Gold accent for the answer */
        }
    </style>
</head>

        function processAndRespond(userQuery) {
            const chatBox = document.getElementById('chat-box');
            
            // 1. Create Thinking Indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = "message bg-stc-purple text-white rounded-2xl rounded-tl-sm self-start shadow-md typing-indicator";
            typingDiv.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
            chatBox.appendChild(typingDiv);
            scrollToBottom();

            // 2. Find the Answer
            let finalAnswer = "";
            let query = userQuery.toLowerCase().trim();

            if (greetingsList.some(greet => query === greet || query.startsWith(greet + " "))) {
                finalAnswer = uiText[currentLang].greetingReply;
            } else {
                let queryWords = query.split(" ");
                let bestMatch = null;
                let maxScore = 0;

                for (let item of botKnowledge) {
                    let score = 0;
                    let questionText = item.q.toLowerCase();
                    
                    for (let word of queryWords) {
                        if (word.length > 2) { 
                            if (questionText.includes(word)) score += 2;
                        }
                    }
                    
                    if (score > maxScore) {
                        maxScore = score;
                        // Format the output smoothly
                        bestMatch = `<div class="opacity-70 text-sm mb-2 pb-2 border-b border-purple-400">` + item.q + `</div>` +
                                    `<strong>` + item.a + `</strong>`;
                    }
                }
                finalAnswer = maxScore > 0 ? bestMatch : uiText[currentLang].notFound;
            }

            // 3. Remove dots and show message after a delay
            setTimeout(() => {
                typingDiv.remove();
                
                const msgDiv = document.createElement('div');
                msgDiv.className = "message bg-stc-purple text-white p-5 rounded-2xl rounded-tl-sm self-start max-w-[90%] sm:max-w-[80%] shadow-md bot-response-text";
                msgDiv.innerHTML = finalAnswer;
                
                chatBox.appendChild(msgDiv);
                scrollToBottom();
            }, 1000); // 1 second thinking time
        }

        function handleSend() {
            const inputField = document.getElementById('user-input');
            const text = inputField.value.trim();
            if(!text) return;

            addUserMessage(text);
            inputField.value = '';

            processAndRespond(text);
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
