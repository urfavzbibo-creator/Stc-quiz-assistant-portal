<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STC Quiz Assistance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        
        :root {
            /* DARK MODE: Pitch Black + Neon Purple */
            --bg-main: #000000;
            --bg-chat-container: #090014;
            --bg-input: #120024;
            --text-main: #ffffff;
            --text-muted: #c084fc;
            --border-color: #4c1d95;
            --stc-purple: #4F008C;
            --neon-purple: #a855f7;
            --bot-bubble: #1e003b;
            --user-bubble: #1f2937;
            --pill-bg: #000000;
        }

        .light-mode {
            --bg-main: #f3f4f6;
            --bg-chat-container: #ffffff;
            --bg-input: #f9fafb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --stc-purple: #4F008C;
            --neon-purple: #4F008C;
            --bot-bubble: #f0e6f7;
            --user-bubble: #4F008C;
            --pill-bg: #f3f4f6;
        }

        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: background-color 0.4s ease; margin: 0; }
        
        .header-bg { background-color: var(--bg-chat-container); border-bottom: 2px solid var(--neon-purple); }
        .chat-wrapper { background-color: var(--bg-chat-container); border: 1px solid var(--border-color); }
        .input-box { background-color: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); }
        .bot-msg { background-color: var(--bot-bubble); border: 1px solid var(--border-color); }
        
        .pill-btn {
            background-color: var(--pill-bg);
            color: var(--text-main);
            border: 1px solid var(--neon-purple);
            border-radius: 9999px;
            padding: 8px 20px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }
        .pill-btn:hover { background-color: var(--stc-purple); box-shadow: 0 0 15px rgba(168, 85, 247, 0.6); transform: translateY(-2px); }

        .typing-indicator { display: flex; gap: 6px; padding: 12px; }
        .dot { width: 8px; height: 8px; background-color: var(--neon-purple); border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col h-screen" onload="initApp()">

    <header class="header-bg p-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="h-12 w-16 bg-white rounded-lg flex items-center justify-center overflow-hidden border border-purple-500/30">
                <img src="image_193da6.jpg" alt="Logo" class="h-10 object-contain" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/0/00/Stc_logo.svg'">
            </div>
            <div>
                <h1 class="text-xl font-bold text-purple-400">STC Quiz Assistance</h1>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="showFlowSelection()" class="w-10 h-10 rounded-full bg-gray-800 text-blue-400"><i class="fa-solid fa-house"></i></button>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-gray-800 text-yellow-400"><i class="fa-solid fa-sun"></i></button>
        </div>
    </header>

    <main class="flex-grow flex justify-center p-4">
        <div class="chat-wrapper w-full max-w-4xl rounded-2xl flex flex-col overflow-hidden">
            <div id="chat-box" class="flex-grow p-6 overflow-y-auto flex flex-col gap-5"></div>
            <div class="input-area p-4 border-t border-purple-900 flex gap-3">
                <input type="text" id="user-input" class="input-box flex-grow rounded-xl px-5 py-4 focus:outline-none" disabled>
                <button onclick="handleSend()" id="send-btn" class="bg-purple-800 text-white px-6 rounded-xl font-bold" disabled>إرسال</button>
            </div>
        </div>
    </main>

    <script>
        // Database arrays are loaded here (omitted for brevity, use your combined array)
        let botKnowledge = [];
        const originalKnowledge = [/* YOUR 95 QA */];
        const telesalesKnowledge = [/* YOUR 65 QA */];

        function initApp() { showFlowSelection(); }
        function showFlowSelection() {
            document.getElementById('chat-box').innerHTML = '';
            printBotMessage("🔥 هلا وغلا في STC Quiz Assistance!<br><br>الرجاء اختيار الاختبار:", false);
            const options = `
                <div class="flex flex-wrap gap-3 mt-3">
                    <button onclick="selectFlow('E-Channels')" class="pill-btn">🌐 E-Channels</button>
                    <button onclick="selectFlow('Call Center')" class="pill-btn">📞 Call Center</button>
                    <button onclick="selectFlow('Resolutions')" class="pill-btn">🛠️ Resolutions</button>
                    <button onclick="selectFlow('Telesales')" class="pill-btn">🛒 Telesales</button>
                    <button onclick="selectFlow('Fiber')" class="pill-btn">⚡ Fiber</button>
                </div>`;
            printBotMessage(options, false);
        }

        function selectFlow(flowName) {
            if (flowName === 'Fiber') {
                printBotMessage("🚧 قريباً... مسار الفايبر سيكون متاحاً قريباً! 🚀", false);
                return;
            }
            botKnowledge = (flowName === 'Telesales') ? telesalesKnowledge : originalKnowledge;
            document.getElementById('user-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            printBotMessage("🔥 هلا والله!<br><br>اسأل أي سؤال بخاطرك أو اضغط على 🎓 وخلّنا نبلش تدريب الكويزات الجاية.<br><br>جاهز تجيب Full Marks؟", false);
        }

        function printBotMessage(html, help=true) {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="bot-msg p-5 rounded-2xl self-start max-w-[85%] text-lg">${html}</div>`;
        }
        
        function handleSend() { /* Your search logic */ }
    </script>
</body>
</html>
