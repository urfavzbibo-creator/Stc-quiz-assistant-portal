        :root {

            --bg-main: #0A0E23;
            --bg-chat-container: #111827;
            --bg-input: #1F2937;
            --text-main: #ffffff;
            --text-muted: #9CA3AF;
            --border-color: #374151;
            --stc-purple: #4F008C;
            --stc-purple-hover: #3b006a;
            --bot-bubble: #4F008C;
            --user-bubble: #374151;
            --option-btn: rgba(79, 0, 140, 0.3);
            --option-btn-hover: rgba(79, 0, 140, 0.6);
        }

        .light-mode {
            /* Light Mode Variables */
            --bg-main: #f3f4f6;
            --bg-chat-container: #ffffff;
            --bg-input: #f9fafb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --stc-purple: #4F008C;
            --stc-purple-hover: #3b006a;
            --bot-bubble: #f0e6f7;
            --user-bubble: #4F008C;
            --option-btn: #f3e8fa;
            --option-btn-hover: #e5d0f5;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            margin: 0;
            padding: 0;
        }

        .header-bg { background-color: var(--bg-chat-container); border-bottom: 4px solid var(--stc-purple); }
        .chat-wrapper { background-color: var(--bg-chat-container); border-color: var(--border-color); }
        .input-area { background-color: var(--bg-chat-container); border-color: var(--border-color); }
        .input-box { background-color: var(--bg-input); color: var(--text-main); border-color: var(--border-color); }
        
        .bot-msg { background-color: var(--bot-bubble); color: var(--text-main); }
        .light-mode .bot-msg { color: #1f2937; } 
        
        .user-msg { background-color: var(--user-bubble); color: #ffffff; }

        .option-button {
            background-color: var(--option-btn);
            color: var(--text-main);
            border: 1px solid var(--stc-purple);
            transition: all 0.2s ease;
        }
        .option-button:hover {
            background-color: var(--option-btn-hover);
            transform: translateY(-2px);
        }
        .light-mode .option-button { color: var(--stc-purple); font-weight: 700; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--stc-purple); border-radius: 10px; }

        .chat-container { height: calc(100vh - 160px); scroll-behavior: smooth; }
        
        .message { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            align-items: center;
            width: fit-content;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: currentColor;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .stc-logo-box {
            background-color: #4F008C;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;

                placeholder: "اكتب سؤالك أو كلمة مفتاحية هنا...",
                send: "إرسال",
                notFound: "عذراً، لم أتمكن من العثور على إجابة. يرجى توضيح استفسارك أو سؤالك.",
                multipleFound: "لقد وجدت أكثر من سؤال متعلق ببحثك. الرجاء اختيار السؤال الذي تقصده:",
                anythingElse: "<br><br><span class='text-sm opacity-80'>هل أستطيع مساعدتك بأي شيء آخر؟ 😊</span>"
            },
            en: {
                placeholder: "Type your question or keyword here...",
                send: "Send",
                notFound: "Sorry, I couldn't find an exact match. Please clarify your inquiry or question.",
                multipleFound: "I found multiple questions related to your search. Please choose one:",
                anythingElse: "<br><br><span class='text-sm opacity-80'>Is there anything else I can help you with? 😊</span>"
            }
        };

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');
            const btn = document.getElementById('theme-btn');
            if(isDarkMode) {
                btn.innerHTML = '<i class="fa-solid fa-moon"></i>';
                btn.className = "w-10 h-10 rounded-full flex items-center justify-center bg-gray-700 text-yellow-400 transition hover:scale-105";
            } else {
                btn.innerHTML = '<i class="fa-solid fa-sun"></i>';
                btn.className = "w-10 h-10 rounded-full flex items-center justify-center bg-gray-200 text-orange-500 transition hover:scale-105";
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            
            document.getElementById('lang-btn').innerText = currentLang === 'ar' ? 'English' : 'عربي';
            document.getElementById('user-input').placeholder = uiText[currentLang].placeholder;
            document.getElementById('send-text').innerText = uiText[currentLang].send;
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addUserMessage(text) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = "message user-msg p-4 rounded-2xl rounded-tl-sm self-end max-w-[90%] sm:max-w-[80%] shadow-md leading-relaxed text-lg";
            if(currentLang === 'ar') {
                msgDiv.classList.replace('rounded-tl-sm', 'rounded-tr-sm');
            }
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            scrollToBottom();
        }

        function showThinking() {
            const chatBox = document.getElementById('chat-box');
            const typingDiv = document.createElement('div');
            typingDiv.id = "thinking-indicator";
            typingDiv.className = "message bot-msg rounded-2xl shadow-md typing-indicator";
            if(currentLang === 'ar') {
                typingDiv.classList.add('self-start', 'rounded-tr-sm');
            } else {
                typingDiv.classList.add('self-start', 'rounded-tl-sm');
            }
            typingDiv.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
            chatBox.appendChild(typingDiv);
            scrollToBottom();
            return typingDiv;
        }

        window.forceAnswer = function(index) {
            const item = botKnowledge[index];
            addUserMessage(item.q);
            
            const typingDiv = showThinking();
            setTimeout(() => {
                typingDiv.remove();
                printBotMessage(`<div class="opacity-70 text-sm mb-2 pb-2 border-b border-purple-500/30">` + item.q + `</div><strong>` + item.a + `</strong>` + uiText[currentLang].anythingElse);
            }, 600);
        };

        function printBotMessage(htmlContent) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = "message bot-msg p-5 rounded-2xl self-start max-w-[95%] sm:max-w-[85%] shadow-md text-lg leading-relaxed";
            if(currentLang === 'ar') {
                msgDiv.classList.add('rounded-tr-sm');
            } else {
                msgDiv.classList.add('rounded-tl-sm');
            }
            msgDiv.innerHTML = htmlContent;
            chatBox.appendChild(msgDiv);
            scrollToBottom();
        }

        function processAndRespond(userQuery) {
            const typingDiv = showThinking();
            let query = userQuery.toLowerCase().trim();

            setTimeout(() => {
                typingDiv.remove();

                let queryWords = query.split(" ").filter(w => w.length > 2);
                if(queryWords.length === 0) queryWords = [query]; 

                let matches = [];

                for (let i = 0; i < botKnowledge.length; i++) {
                    let score = 0;
                    let qText = botKnowledge[i].q.toLowerCase();
                    
                    for (let word of queryWords) {
                        if (qText.includes(word)) score += 1;
                    }
                    if (score > 0) {
                        matches.push({ index: i, score: score, item: botKnowledge[i] });
                    }
                }

                matches.sort((a, b) => b.score - a.score);

                if (matches.length === 0) {
                    printBotMessage(uiText[currentLang].notFound);
                } 
                else if (matches.length === 1 || matches[0].score > matches[1]?.score + 1) {
                    let item = matches[0].item;
                    printBotMessage(`<div class="opacity-70 text-sm mb-2 pb-2 border-b border-purple-500/30">` + item.q + `</div><strong>` + item.a + `</strong>` + uiText[currentLang].anythingElse);
                } 
                else {
                    let topMatches = matches.slice(0, 4); 
                    let optionsHtml = `<p class="mb-3 font-bold">${uiText[currentLang].multipleFound}</p><div class="flex flex-col gap-2">`;
                    
                    for (let match of topMatches) {
                        optionsHtml += `<button onclick="forceAnswer(${match.index})" class="option-button text-right p-3 rounded-xl text-md cursor-pointer transition-all shadow-sm">${match.item.q}</button>`;
                    }
                    optionsHtml += `</div>`;
                    
                    printBotMessage(optionsHtml);
                }

            }, 800); 
        }

        function handleSend() {
            const inputField = document.getElementById('user-input');
            const text = inputField.value.trim();
            if(!text) return;

            addUserMessage(text);
            inputField.value = '';

            processAndRespond(text);
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
