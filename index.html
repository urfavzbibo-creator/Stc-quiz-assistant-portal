<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STC Quiz Assistance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        
        :root {
            /* APPLE OLED DARK MODE WITH STC ACCENTS */
            --bg-main: #000000;
            --bg-glass: rgba(28, 28, 30, 0.7); /* iOS System Gray 6 with transparency */
            --bg-glass-lighter: rgba(44, 44, 46, 0.7);
            --text-main: #F5F5F7;
            --text-muted: #8E8E93;
            --border-glass: rgba(255, 255, 255, 0.08);
            --stc-purple: #4F008C;
            --ios-purple: #BF5AF2; /* Apple's system purple */
            --bot-bubble: rgba(88, 86, 214, 0.15); /* Soft indigo/purple glass */
            --user-bubble: rgba(44, 44, 46, 0.8); /* iOS dark gray bubble */
        }

        .light-mode {
            --bg-main: #F2F2F7; /* iOS System Light Gray */
            --bg-glass: rgba(255, 255, 255, 0.8);
            --bg-glass-lighter: rgba(255, 255, 255, 0.9);
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --border-glass: rgba(0, 0, 0, 0.05);
            --bot-bubble: rgba(88, 86, 214, 0.1);
            --user-bubble: #ffffff;
        }

        body { 
            font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            transition: background-color 0.4s ease; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* Glassmorphism Utilities */
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
        }
        
        .header-bg { 
            background: var(--bg-glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 0.5px solid var(--border-glass); 
        }

        .bot-msg { 
            background: var(--bot-bubble);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 0.5px solid var(--border-glass);
            color: var(--text-main); 
        }
        
        .user-msg { 
            background: var(--user-bubble); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 0.5px solid var(--border-glass);
            color: var(--text-main); 
        }

        /* Scrollbar Hidden for cleaner iOS look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .chat-container { 
            height: calc(100vh - 80px); /* Account for header */
            scroll-behavior: smooth; 
            padding-bottom: 120px !important; /* Space for floating input */
        }
        
        .message { animation: springUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes springUp { 
            from { opacity: 0; transform: translateY(20px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* Apple Style Typing Indicator */
        .typing-indicator { display: flex; gap: 4px; padding: 14px 18px; align-items: center; width: fit-content; }
        .dot { width: 6px; height: 6px; background-color: var(--text-muted); border-radius: 50%; animation: iosBounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes iosBounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-4px); opacity: 1; } }
        
        /* Floating Pill Input */
        .input-dock {
            background: linear-gradient(to top, var(--bg-main) 60%, transparent);
        }
        
        .pill-input-wrapper {
            background: var(--bg-glass-lighter);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid var(--border-glass);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .pill-btn { 
            background: var(--bg-glass-lighter); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: var(--text-main); 
            border: 0.5px solid var(--border-glass); 
            border-radius: 9999px; 
            padding: 10px 24px; 
            font-weight: 500; 
            font-size: 0.95rem; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); 
            cursor: pointer;
        }
        .pill-btn:hover { 
            background: var(--ios-purple); 
            color: #ffffff; 
            border-color: var(--ios-purple);
            transform: scale(1.02); 
        }
        
        .action-icon {
            background: var(--bg-glass-lighter);
            border: 0.5px solid var(--border-glass);
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        .action-icon:hover {
            background: var(--bg-glass);
            transform: scale(1.05);
        }

        .send-btn-ios { 
            background-color: var(--ios-purple); 
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
        .send-btn-ios:hover:not(:disabled) { 
            transform: scale(1.05); 
            background-color: #D57FF5; 
        }
        .send-btn-ios:disabled {
            background-color: var(--bg-glass);
            color: var(--text-muted);
        }
        
        .live-indicator { width: 8px; height: 8px; background-color: #FF453A; border-radius: 50%; display: inline-block; animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col h-screen" onload="initApp()">

    <!-- SECURE LOGIN OVERLAY (Glassmorphism) -->
    <div id="login-overlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-2xl transition-opacity duration-700">
        <div class="glass-panel rounded-3xl p-10 max-w-sm w-full mx-4 flex flex-col gap-6 items-center text-center shadow-2xl">
            <div class="h-20 w-24 bg-white/10 rounded-2xl flex items-center justify-center overflow-hidden border border-white/20 mb-2 p-3 shadow-inner">
                <img src="image_9004c3.jpg" alt="STC Quiz Logo" class="h-full object-contain" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/0/00/Stc_logo.svg'; this.classList.add('filter','brightness-0','invert');">
            </div>
            
            <div>
                <h2 class="text-2xl font-bold mb-1 tracking-wide" style="color: var(--ios-purple);">STC Portal</h2>
                <p class="text-sm opacity-60" style="color: var(--text-muted);">Restricted Access</p>
            </div>
            
            <div class="w-full flex flex-col gap-3">
                <input type="text" id="login-user" class="w-full rounded-xl px-5 py-4 focus:outline-none transition text-left bg-black/20 border border-white/10 text-white placeholder-gray-500" placeholder="Username" dir="ltr">
                <input type="password" id="login-pass" class="w-full rounded-xl px-5 py-4 focus:outline-none transition text-left bg-black/20 border border-white/10 text-white placeholder-gray-500" placeholder="Password" dir="ltr" onkeypress="if(event.key === 'Enter') attemptLogin()">
            </div>
            
            <p id="login-error" class="text-[#FF453A] text-xs hidden font-medium tracking-wide">
                Invalid Credentials. Please try again.
            </p>
            
            <button onclick="attemptLogin()" class="w-full bg-[#BF5AF2] hover:bg-[#D57FF5] text-white py-4 rounded-xl font-bold text-md transition-all active:scale-95 mt-2">
                Unlock
            </button>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="main-app" class="flex flex-col h-screen opacity-0 transition-opacity duration-1000 pointer-events-none relative">
        
        <!-- HEADER -->
        <header class="header-bg p-4 flex justify-between items-center absolute top-0 w-full z-40">
            <div class="flex items-center gap-3">
                <div id="logo-container" class="h-10 rounded-xl bg-white/5 flex items-center justify-center overflow-hidden px-2 border border-white/10">
                    <img src="image_9004c3.jpg" alt="Logo" class="h-6 object-contain" 
                         onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/0/00/Stc_logo.svg'; this.classList.add('filter','brightness-0','invert');">
                </div>
                <div class="flex flex-col">
                    <h1 class="text-lg font-bold tracking-wide" style="color: var(--text-main);">STC Assistant</h1>
                    <p class="text-[10px] uppercase tracking-wider" style="color: var(--ios-purple);" id="mode-subtitle">General AI</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="showFlowSelection()" class="action-icon w-9 h-9 rounded-full flex items-center justify-center" title="Home">
                    <i class="fa-solid fa-layer-group text-sm"></i>
                </button>
                <button onclick="toggleAdmin()" class="action-icon w-9 h-9 rounded-full flex items-center justify-center" title="Dashboard">
                    <i class="fa-solid fa-chart-simple text-sm"></i>
                </button>
                <button onclick="toggleQuizMode()" class="action-icon w-9 h-9 rounded-full flex items-center justify-center" title="Quiz" id="quiz-btn">
                    <i class="fa-solid fa-graduation-cap text-sm"></i>
                </button>
            </div>
        </header>

        <!-- CHAT AREA -->
        <main class="flex-grow flex justify-center relative w-full pt-20">
            <div class="w-full max-w-4xl flex flex-col relative h-full">
                <div id="chat-box" class="chat-container p-4 sm:p-6 flex flex-col gap-4 overflow-y-auto w-full"></div>
                
                <!-- FLOATING DOCKED INPUT (APPLE STYLE) -->
                <div class="absolute bottom-0 w-full p-4 input-dock z-40 pb-6">
                    <div class="pill-input-wrapper rounded-full flex items-center p-1.5 gap-2 max-w-3xl mx-auto">
                        <input type="text" id="user-input" class="flex-grow bg-transparent border-none text-white px-5 py-2 focus:outline-none placeholder-gray-500 text-md" placeholder="Message or type 'test'..." disabled>
                        <button onclick="handleSend()" id="send-btn" class="send-btn-ios w-9 h-9 rounded-full flex items-center justify-center text-white shrink-0" disabled>
                            <i class="fa-solid fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- LIVE ADMIN DASHBOARD (Glassmorphic) -->
        <div id="admin-modal" class="absolute inset-0 z-50 hidden items-center justify-center p-4 bg-black/40 backdrop-blur-2xl">
            <div class="glass-panel rounded-3xl p-8 max-w-4xl w-full max-h-[90vh] flex flex-col shadow-2xl">
                <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                    <h2 class="text-xl font-bold" style="color: var(--text-main);">
                        Terminal <span class="live-indicator ml-2"></span>
                    </h2>
                    <button onclick="toggleAdmin()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition"><i class="fa-solid fa-xmark text-sm"></i></button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-white/5 border border-white/5 p-5 rounded-2xl text-center">
                        <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">Queries</p>
                        <p class="text-3xl font-light text-white" id="stat-total">0</p>
                    </div>
                    <div class="bg-white/5 border border-white/5 p-5 rounded-2xl text-center">
                        <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">Accuracy</p>
                        <p class="text-3xl font-light text-[#32D74B]" id="stat-success">0%</p>
                    </div>
                    <div class="bg-white/5 border border-white/5 p-5 rounded-2xl text-center">
                        <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">Misses</p>
                        <p class="text-3xl font-light text-[#FF453A]" id="stat-failed">0</p>
                    </div>
                </div>

                <div class="flex-grow grid grid-cols-1 md:grid-cols-2 gap-4 overflow-hidden">
                    <div class="flex flex-col overflow-hidden">
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 pl-1">Live Feed</h3>
                        <ul id="analytics-log" class="bg-white/5 border border-white/5 rounded-2xl p-4 text-sm text-gray-300 flex flex-col gap-3 overflow-y-auto flex-grow h-48 scroll-smooth">
                            <li class="opacity-40 italic font-light text-center mt-10">Awaiting input...</li>
                        </ul>
                    </div>
                    <div class="flex flex-col overflow-hidden">
                        <h3 class="text-xs font-bold text-[#FF453A] uppercase tracking-widest mb-3 pl-1">Exceptions</h3>
                        <ul id="error-log" class="bg-[#FF453A]/10 border border-[#FF453A]/20 rounded-2xl p-4 text-sm text-gray-300 flex flex-col gap-3 overflow-y-auto flex-grow h-48 scroll-smooth">
                            <li class="opacity-40 italic font-light text-center mt-10 text-[#FF453A]">No exceptions.</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGIN LOGIC ---
        function attemptLogin() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            
            if (user === 'zbibo' && pass === 'Stc123') {
                document.getElementById('login-error').classList.add('hidden');
                const overlay = document.getElementById('login-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    const mainApp = document.getElementById('main-app');
                    mainApp.classList.remove('opacity-0', 'pointer-events-none');
                    showFlowSelection();
                }, 700);
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        // --- KNOWLEDGE BASE (Exact 102 Options) ---

    {q: "The validity of points in qitaf program is? / صلاحية النقاط في برنامج قطاف هي؟", a: "12 months / 12 شهر", options: ["3 months / 3 أشهر", "12 months / 12 شهر", "18 months / 18 شهر", "24 months / 24 شهر"]},
    {q: "The cost for transfer ownership for postpaid line: / كم تكلفة نقل الملكية لخطوط الدفع الآجل؟", a: "5 KD / 5 KD", options: ["5 KD / 5 KD", "10 KD / 10 KD", "15 KD / 15 KD", "20 KD / 20 KD"]},
    {q: "To cancel Budget control service: / لإلغاء خدمة ال Budget Control:", a: "#550# / #550#", options: ["#550# / #550#", "#505# / #505#", "*550# / *550#", "*505# / *505#"]},
    {q: "Postpaid data customer will get .....GBs with 5KD booster: / خدمة الانترنت الاضافي لباقات الدفع الآجل الانترنت تمنح 5 KD (...) GBs:", a: "250 GB / 250 GB", options: ["100 GB / 100 GB", "500 GB / 500 GB", "250 GB / 250 GB"]},

    {q: "Postpaid voice 45 KD customers get ....GB of data on Roaming: / سيحصل عملاء باقة 45 د.ك انترنت أثناء التجوال على (...) GB:", a: "10 GB / 10 GB", options: ["10 GB / 10 GB", "5 GB / 5 GB", "3 GB / 3 GB", "1 GB / 1 GB"]},

    {q: "Can stc Postpaid customers use payment service in the Chatbot? / هل يستطيعون عملاء stc للدفع الآجل استخدام خاصية الدفع من خلال نظام المساعد الآلي؟", a: "Yes / نعم", options: ["Yes / نعم", "No / لا"]},
    {q: "9 kd go prepaid plan provides: / توفر خط الدفع المسبق 9 د.ك:", a: "All of the mentioned / كل ما ذكر", options: ["Unlimited On-net minutes / دقائق غير محدودة داخل الشبكة", "Unlimited Social Media / وسائل التواصل الاجتماعي غير المحدودة", "All of the mentioned / كل ما ذكر", "None of the mentioned / لا شيء من المذكور"]},
    {q: "How long does it take to get ready for a call? / كم مدة الاستعداد للمكالمة:", a: "less than 3 seconds / أقل من 3 ثوان", options: ["less than 3 seconds / أقل من 3 ثوان", "less than 5 seconds / أقل من 5 ثوان", "less than 7 seconds / أقل من 7 ثوان", "None of the above / ليس أيا مما سبق"]},

        function initApp() {
            const btn = document.getElementById('theme-btn');
            btn.innerHTML = '<i class="fa-solid fa-moon"></i>';
        }

        function showFlowSelection() {
            isQuizMode = false;
            botKnowledge = []; 
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = ''; 
            
            document.getElementById('user-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('quiz-btn').disabled = false;
            document.getElementById('quiz-btn').style.opacity = "1";
            document.getElementById('mode-subtitle').innerText = "المساعد الذكي العام";
            document.getElementById('mode-subtitle').style.color = "";
            
            printBotMessage(uiText['ar'].greeting, false);

            const optionsHtml = `
                <div class="flex flex-wrap gap-3 mt-3 justify-center sm:justify-start">
                    <button onclick="selectFlow('E-Channels')" class="pill-btn">🌐 E-Channels</button>
                    <button onclick="selectFlow('Call Center')" class="pill-btn">📞 Call Center</button>
                    <button onclick="selectFlow('Resolutions')" class="pill-btn">🛠️ Resolutions</button>
                    <button onclick="selectFlow('Telesales')" class="pill-btn">🛒 Telesales</button>
                    <button onclick="selectFlow('Fiber')" class="pill-btn">⚡ Fiber</button>
                </div>
            `;
            printBotMessage(optionsHtml, false);
        }

        function selectFlow(flowName) {
            addUserMessage(flowName);
            const typingDiv = showThinking();
            
            if (flowName === 'Fiber') {
                setTimeout(() => {
                    typingDiv.remove();
                    printBotMessage(uiText['ar'].comingSoon, false);
                }, 800);
                return; 
            }

            if (flowName === 'Telesales') {
                botKnowledge = telesalesKnowledge;
            } else {
                botKnowledge = originalKnowledge; 
            }
            
            document.getElementById('mode-subtitle').innerText = "مسار: " + flowName;
            
            setTimeout(() => {
                typingDiv.remove();
                printBotMessage(uiText['ar'].flowSelected, false);
            }, 800);
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');
            const btn = document.getElementById('theme-btn');
            if(isDarkMode) {
                btn.innerHTML = '<i class="fa-solid fa-moon"></i>';
                btn.className = "action-icon w-9 h-9 rounded-full flex items-center justify-center text-yellow-400";
            } else {
                btn.innerHTML = '<i class="fa-solid fa-sun"></i>';
                btn.className = "action-icon w-9 h-9 rounded-full flex items-center justify-center text-orange-500";
            }
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addUserMessage(text) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = "message user-msg p-4 rounded-3xl rounded-tr-sm self-end max-w-[90%] sm:max-w-[80%] shadow-md leading-relaxed text-[1rem]";
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            scrollToBottom();
        }

        function showThinking() {
            const chatBox = document.getElementById('chat-box');
            const typingDiv = document.createElement('div');
            typingDiv.id = "thinking-indicator";
            typingDiv.className = "message bot-msg p-4 rounded-3xl shadow-md typing-indicator self-start rounded-tl-sm";
            typingDiv.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
            chatBox.appendChild(typingDiv);
            scrollToBottom();
            return typingDiv;
        }

        function printBotMessage(htmlContent, appendHelp = true) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = "message bot-msg p-5 rounded-3xl self-start max-w-[95%] sm:max-w-[85%] text-[1rem] leading-relaxed w-full rounded-tl-sm shadow-md";
            msgDiv.innerHTML = htmlContent + (appendHelp ? uiText['ar'].anythingElse : "");
            chatBox.appendChild(msgDiv);
            scrollToBottom();
        }

        function toggleAdmin() {
            const modal = document.getElementById('admin-modal');
            if (modal.classList.contains('hidden')) {
                document.getElementById('stat-total').innerText = analytics.total;
                let rate = analytics.total > 0 ? Math.round((analytics.hits / analytics.total) * 100) : 0;
                document.getElementById('stat-success').innerText = rate + "%";
                document.getElementById('stat-failed').innerText = analytics.misses;
                
                const logUl = document.getElementById('analytics-log');
                if(analytics.logs.length > 0) {
                    logUl.innerHTML = analytics.logs.map(log => 
                        `<li class="border-b border-white/5 pb-2 mb-2 flex items-center">
                            <span class="${log.found ? 'text-[#32D74B]' : 'text-[#FFD60A]'} mr-3 text-lg">
                                <i class="fa-solid ${log.found ? 'fa-check' : 'fa-magnifying-glass'}"></i>
                            </span>
                            <span class="text-white/80 font-light">Searched: "${log.query}"</span>
                        </li>`
                    ).join('');
                } else {
                    logUl.innerHTML = '<li class="opacity-40 italic font-light text-center mt-10">Awaiting input...</li>';
                }

                const errUl = document.getElementById('error-log');
                if(analytics.errors.length > 0) {
                    errUl.innerHTML = analytics.errors.map(err => 
                        `<li class="border-b border-[#FF453A]/20 pb-2 mb-2 flex items-center text-[#FF453A]/80 font-light">
                            <i class="fa-solid fa-triangle-exclamation mr-2"></i> ${err}
                        </li>`
                    ).join('');
                }

                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        function logAnalytics(query, found) {
            analytics.total++;
            if(found) analytics.hits++; 
            analytics.logs.unshift({query: query, found: found}); 
            if(analytics.logs.length > 50) analytics.logs.pop(); 
        }

        function logError(msg) {
            analytics.misses++;
            analytics.errors.unshift(msg);
            if(analytics.errors.length > 50) analytics.errors.pop();
        }

        // --- EXPLICIT EXACT MCQ QUIZ ENGINE ---
        function toggleQuizMode() {
            let activePool = botKnowledge.length > 0 ? botKnowledge : allKnowledge;
            if(activePool.length === 0) return; 
            
            isQuizMode = !isQuizMode;
            document.getElementById('chat-box').innerHTML = ''; 
            
            if(isQuizMode) {
                document.getElementById('mode-subtitle').innerText = "وضع الاختبار 🎓";
                document.getElementById('mode-subtitle').style.color = "var(--ios-purple)";
                quizScore = 0; quizAttempts = 0;
                printBotMessage(uiText['ar'].quizStart, false);
                askNextMCQ();
            } else {
                document.getElementById('mode-subtitle').innerText = botKnowledge.length > 0 ? "مسار فرعي" : "المساعد الذكي العام";
                document.getElementById('mode-subtitle').style.color = "";
                currentQuizItem = null;
                printBotMessage(uiText['ar'].quizEnd, false);
            }
        }

        function askNextMCQ() {
            let activePool = botKnowledge.length > 0 ? botKnowledge : allKnowledge;
            const randomIndex = Math.floor(Math.random() * activePool.length);
            currentQuizItem = activePool[randomIndex];
            
            let choices = [];
            
            // USE EXACT OPTIONS FROM EXCEL SHEET (NO RANDOM GUESSING)
            if (currentQuizItem.options && currentQuizItem.options.length > 0) {
                choices = [...currentQuizItem.options];
            } else {
                // Fallback for Telesales (no preset options)
                choices = [currentQuizItem.a];
                let questionWords = currentQuizItem.q.split(' ').filter(w => w.length > 4);
                let similarItems = activePool.filter(item => {
                    return questionWords.some(qw => item.q.includes(qw)) && item.a !== currentQuizItem.a;
                });

                let attempts = 0;
                while(choices.length < 4 && similarItems.length > 0 && attempts < 50) {
                    let rIdx = Math.floor(Math.random() * similarItems.length);
                    let wAns = similarItems[rIdx].a;
                    let isTooSimilar = choices.some(c => c.includes(wAns) || wAns.includes(c));
                    if(!choices.includes(wAns) && wAns.length > 1 && !isTooSimilar) { choices.push(wAns); }
                    attempts++;
                }

                attempts = 0;
                while(choices.length < 4 && attempts < 100) {
                    let randomWrongIndex = Math.floor(Math.random() * activePool.length);
                    let wAns = activePool[randomWrongIndex].a;
                    let isTooSimilar = choices.some(c => c.includes(wAns) || wAns.includes(c));
                    if(!choices.includes(wAns) && wAns.length > 1 && !isTooSimilar) { choices.push(wAns); }
                    attempts++;
                }
                choices.sort(() => Math.random() - 0.5); 
            }
            
            let quizHtml = `<div class="text-[1.1rem] font-bold opacity-90 mb-5 text-white tracking-wide leading-relaxed">${currentQuizItem.q}</div>`;
            quizHtml += `<div class="flex flex-col gap-3 w-full">`;
            
            for(let i=0; i<choices.length; i++) {
                let safeChoice = choices[i].replace(/'/g, "\\'").replace(/"/g, '&quot;');
                let isCorrect = (choices[i] === currentQuizItem.a);
                quizHtml += `<button onclick="handleMCQSelection('${safeChoice}', ${isCorrect})" class="pill-btn w-full text-right p-4 rounded-2xl text-[0.95rem] cursor-pointer">${choices[i]}</button>`;
            }
            quizHtml += `</div>`;

            setTimeout(() => { printBotMessage(quizHtml, false); }, 800);
        }

        window.handleMCQSelection = function(selectedText, isCorrect) {
            addUserMessage(selectedText);
            const typingDiv = showThinking();
            
            setTimeout(() => {
                typingDiv.remove();
                quizAttempts++;
                
                if(isCorrect) {
                    quizScore++;
                    printBotMessage(`✅ <strong>إجابة صحيحة!</strong> 👏<br><br><span class="text-sm font-bold text-[#32D74B]">النتيجة: ${quizScore}/${quizAttempts}</span>`, false);
                } else {
                    printBotMessage(`❌ <strong>إجابة خاطئة.</strong><br><br>الجواب الصحيح هو:<br><span class="font-bold text-[1rem] p-2 bg-[#BF5AF2]/20 rounded block mt-2">${currentQuizItem.a}</span><br><span class="text-sm font-bold opacity-80 mt-2 block">النتيجة: ${quizScore}/${quizAttempts}</span>`, false);
                }
                
                setTimeout(() => { askNextMCQ(); }, 2500);
            }, 800);
        }

        window.forceAnswer = function(index, useAllPool = false) {
            let activePool = useAllPool ? allKnowledge : botKnowledge;
            const item = activePool[index];
            addUserMessage(item.q);
            logAnalytics(item.q, true);
            
            const typingDiv = showThinking();
            setTimeout(() => {
                typingDiv.remove();
                printBotMessage(`<div class="opacity-60 text-sm mb-3 pb-3 border-b border-white/10 font-light">${item.q}</div><strong class="text-white text-[1rem] leading-relaxed block">${item.a}</strong>`, true);
            }, 600);
        };

        function processAndRespond(userQuery) {
            const typingDiv = showThinking();
            let query = userQuery.toLowerCase().trim();
            
            for(let cat of chitChatCategories) {
                if(cat.words.some(w => query.includes(w))) {
                    setTimeout(() => { typingDiv.remove(); printBotMessage(cat.reply, false); }, 800);
                    return;
                }
            }

            const yesWords = ['yes', 'yeah', 'yep', 'y', 'sure', 'of course', 'نعم', 'اي', 'إي', 'أكيد', 'اكيد', 'يلا', 'جاهز', 'يب', 'اي نعم', 'اكيد جاهز'];
            const noWords = ['no', 'nope', 'n', 'لا', 'كلا', 'سلامتك', 'مو الحين'];
            
            if (yesWords.includes(query)) {
                setTimeout(() => { typingDiv.remove(); printBotMessage(uiText['ar'].yesReply, false); }, 800);
                return;
            }
            if (noWords.includes(query)) {
                setTimeout(() => { typingDiv.remove(); printBotMessage(uiText['ar'].noReply, false); }, 800);
                return;
            }

            const quizWords = ['test', 'quiz', 'اختبار', 'كويز', 'امتحان', 'تست', 'جربني', 'اختبرني'];
            if (quizWords.some(w => query.includes(w))) {
                setTimeout(() => {
                    typingDiv.remove();
                    if (!isQuizMode) toggleQuizMode();
                    else printBotMessage(uiText['ar'].useOptions, false);
                }, 800);
                return;
            }

            if (query.includes('e-channels') || query.includes('قنوات')) { setTimeout(() => { typingDiv.remove(); selectFlow('E-Channels'); }, 800); return; }
            if (query.includes('call center') || query.includes('كول سنتر') || query.includes('اتصال')) { setTimeout(() => { typingDiv.remove(); selectFlow('Call Center'); }, 800); return; }
            if (query.includes('resolutions') || query.includes('حلول')) { setTimeout(() => { typingDiv.remove(); selectFlow('Resolutions'); }, 800); return; }
            if (query.includes('telesales') || query.includes('مبيعات')) { setTimeout(() => { typingDiv.remove(); selectFlow('Telesales'); }, 800); return; }
            if (query.includes('fiber') || query.includes('فايبر')) { setTimeout(() => { typingDiv.remove(); selectFlow('Fiber'); }, 800); return; }

            if (query.includes("زيد") || query.includes("zeed")) query += " زييد";

            setTimeout(() => {
                typingDiv.remove();
                let queryWords = query.split(" ").filter(w => w.length > 2);
                if(queryWords.length === 0) queryWords = [query]; 

                let activePool = botKnowledge.length > 0 ? botKnowledge : allKnowledge;
                
                let matches = [];
                for (let i = 0; i < activePool.length; i++) {
                    let score = 0;
                    let qText = activePool[i].q.toLowerCase();
                    for (let word of queryWords) {
                        if (qText.includes(word)) score += 1;
                    }
                    if (score > 0) matches.push({ index: i, score: score, item: activePool[i] });
                }

                matches.sort((a, b) => b.score - a.score);

                if (matches.length === 0) {
                    logAnalytics(query, false);
                    logError(`Zero matches for: '${query}'`);
                    printBotMessage(uiText['ar'].notFound, false);
                } 
                else if (matches.length === 1 || matches[0].score > matches[1]?.score + 1) {
                    logAnalytics(query, true);
                    let item = matches[0].item;
                    printBotMessage(`<div class="opacity-60 text-sm mb-3 pb-3 border-b border-white/10 font-light">${item.q}</div><strong class="text-white text-[1rem] leading-relaxed block">${item.a}</strong>`, true);
                } 
                else {
                    logAnalytics(query, true);
                    let topMatches = matches.slice(0, 4); 
                    let optionsHtml = `<p class="mb-4 font-bold text-[#BF5AF2]">${uiText['ar'].multipleFound}</p><div class="flex flex-col gap-3">`;
                    for (let match of topMatches) {
                        optionsHtml += `<button onclick="forceAnswer(${match.index}, ${botKnowledge.length === 0})" class="pill-btn w-full text-right p-4 rounded-2xl text-[0.95rem] cursor-pointer">${match.item.q}</button>`;
                    }
                    optionsHtml += `</div>`;
                    printBotMessage(optionsHtml, false);
                }
            }, 800); 
        }

        function handleSend() {
            const inputField = document.getElementById('user-input');
            const text = inputField.value.trim();
            if(!text) return; 

            document.getElementById('send-btn').disabled = true;
            addUserMessage(text);
            inputField.value = '';

            if(isQuizMode) printBotMessage(uiText['ar'].useOptions, false);
            else processAndRespond(text);
        }

        // Toggle send button state based on input
        document.getElementById('user-input').addEventListener('input', function(e) {
            document.getElementById('send-btn').disabled = e.target.value.trim() === '';
        });

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('send-btn').disabled) handleSend();
        });
    </script>
