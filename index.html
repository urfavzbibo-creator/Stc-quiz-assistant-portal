<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zbibo Quiz Assistance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        :root {
            --bg-main: #0a0a0a;
            --bg-chat: #141414;
            --neon-purple: #8A2BE2;
            --dark-purple: #4F008C;
            --text-light: #ffffff;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-light); 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 50;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .login-card {
            width: 380px; max-width: 90%;
            background: #1a1a1a; border: 1px solid #333;
            border-radius: 16px; padding: 40px 30px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.2);
            text-align: center;
        }
        .login-input {
            width: 100%; background: #0d0d0d; border: 1px solid #444; color: white;
            border-radius: 8px; padding: 14px; font-size: 16px; text-align: center;
            outline: none; transition: all 0.3s; margin-top: 20px;
        }
        .login-input:focus { border-color: var(--neon-purple); box-shadow: 0 0 10px rgba(138,43,226,0.3); }
        .login-btn {
            width: 100%; background: var(--neon-purple); color: white;
            border: none; border-radius: 8px; padding: 14px; margin-top: 20px;
            font-weight: bold; font-size: 16px; cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover { background: #9b4de0; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(138,43,226,0.4); }

        /* --- MAIN APP --- */
        #main-app {
            width: 100%; max-width: 1000px; height: 90vh;
            background: var(--bg-chat);
            border-radius: 16px; border: 1px solid #2a2a2a;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        
        .chat-header {
            padding: 15px 20px; border-bottom: 1px solid #2a2a2a;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .chat-messages {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        .msg-bubble {
            max-width: 80%; padding: 14px 18px; border-radius: 16px;
            font-size: 15px; line-height: 1.5; animation: popIn 0.3s ease forwards;
        }
        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-bot { background: #222; color: #eee; align-self: flex-start; border: 1px solid #333; }
        .msg-user { background: var(--dark-purple); color: white; align-self: flex-end; }

        .flow-grid {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 20px;
            margin: 10px auto; max-width: 80%;
        }
        .flow-pill {
            background: #0d0d0d; color: #ccc; border: 1px solid #444;
            border-radius: 99px; padding: 10px 20px; font-size: 14px;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            transition: all 0.2s;
        }
        .flow-pill:hover { background: #222; color: white; border-color: var(--neon-purple); box-shadow: 0 0 10px rgba(138,43,226,0.2); }

        .input-bar {
            padding: 15px 20px; border-top: 1px solid #2a2a2a;
            display: flex; gap: 10px; background: #1a1a1a; border-radius: 0 0 16px 16px;
        }
        .chat-input {
            flex-grow: 1; background: #0d0d0d; border: 1px solid #333; color: white;
            border-radius: 8px; padding: 14px 20px; outline: none; transition: border 0.3s;
        }
        .chat-input:focus { border-color: var(--neon-purple); }
        .send-btn {
            background: var(--neon-purple); color: white; width: 52px; height: 52px;
            border-radius: 8px; border: none; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 20px;
            transition: all 0.2s;
        }
        .send-btn:hover:not(:disabled) { transform: scale(1.05); background: #9b4de0; }
        .send-btn:disabled { background: #333; cursor: not-allowed; color: #666; }

        .typing-indicator { display: flex; gap: 4px; padding: 14px 18px; align-items: center; width: fit-content; }
        .dot { width: 6px; height: 6px; background-color: var(--neon-purple); border-radius: 50%; animation: iosBounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes iosBounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-4px); opacity: 1; } }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-card">
            <h2 class="text-3xl font-bold text-white mb-2" style="text-shadow: 0 0 15px rgba(138,43,226,0.6);">Zbibo Quiz</h2>
            <p class="text-sm text-gray-400">Assistance Portal</p>
            
            <input type="text" id="login-name" class="login-input" placeholder="أدخل اسمك / Your Name" onkeypress="if(event.key === 'Enter') handleLogin()">
            <p id="login-error" class="text-red-500 text-xs hidden mt-2">الرجاء إدخال اسمك / Please enter your name.</p>
            
            <button onclick="handleLogin()" class="login-btn">Start Session</button>
        </div>
    </div>

    <!-- MAIN CHAT APP -->
    <div id="main-app">
        <div class="chat-header">
            <div class="flex items-center gap-3">
                <div class="bg-gray-800 p-2 rounded-lg text-[#8A2BE2]"><i class="fa-solid fa-robot"></i></div>
                <div>
                    <h1 class="font-bold text-md tracking-wide">Zbibo Quiz Assistance</h1>
                    <p class="text-xs text-[#8A2BE2]" id="current-flow-text">عام / General</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="quiz-timer" class="hidden text-red-500 font-bold font-mono">15:00</span>
                <button onclick="showMenu()" class="text-gray-400 hover:text-white transition" title="Home"><i class="fa-solid fa-house"></i></button>
            </div>
        </div>

        <div id="chat-box" class="chat-messages"></div>

        <div class="input-bar">
            <input type="text" id="chat-input" class="chat-input" placeholder="اكتب سؤالك هنا..." disabled>
            <button onclick="handleInput()" id="send-btn" class="send-btn" disabled><i class="fa-solid fa-paper-plane rtl:-scale-x-100"></i></button>
        </div>
    </div>

    <script>
        // --- DATA & STATE ---
        let currentLang = 'ar';
        let userName = "";
        let isQuizMode = false;
        
        let quizScore = 0;
        let quizAttempts = 0;
        let quizPool = [];
        let cheatWarnings = 0;
        let quizTimer;
        let timeLeft = 900;

        // --- 102 ORIGINAL KNOWLEDGE BASE ---
        const originalKnowledge = [
            {q: "How many days the Prepaid line will stay on Grace? / كم يوم يبقى الخط في Grace؟", a: "30 days / 30 يوم", options: ["60 days / 60 يوم", "30 days / 30 يوم", "20 days / 20 يوم", "45 days / 45 يوم"]},
            {q: "What is internet capacity in 25 KD voice package? / ما هي سعة الانترنت في باقة ال 25 الصوتية؟", a: "100 GB / 100 GB", options: ["10 GB / 10 GB", "25 GB / 25 GB", "50 GB / 50 GB", "100 GB / 100 GB"]},
            {q: "How much does a temporary suspension service cost for a month (summer suspension)? / كم هي تكلفة خدمة الايقاف المؤقت لمدة شهر؟", a: "None of the mentioned / ليس أي مما سبق", options: ["15 KD / 15 KD", "20 KD / 20 KD", "25 KD / 25 KD", "None of the mentioned / ليس أي مما سبق"]},
            {q: "The validity of points in qitaf program is? / صلاحية النقاط في برنامج قطاف هي؟", a: "12 months / 12 شهر", options: ["3 months / 3 أشهر", "12 months / 12 شهر", "18 months / 18 شهر", "24 months / 24 شهر"]},
            {q: "The cost for transfer ownership for postpaid line: / كم تكلفة نقل الملكية لخطوط الدفع الآجل؟", a: "5 KD / 5 KD", options: ["5 KD / 5 KD", "10 KD / 10 KD", "15 KD / 15 KD", "20 KD / 20 KD"]},
            {q: "To cancel Budget control service: / لإلغاء خدمة ال Budget Control:", a: "#550# / #550#", options: ["#550# / #550#", "#505# / #505#", "*550# / *550#", "*505# / *505#"]},
            {q: "Postpaid data customer will get .....GBs with 5KD booster: / خدمة الانترنت الاضافي لباقات الدفع الآجل الانترنت تمنح 5 KD (...) GBs:", a: "250 GB / 250 GB", options: ["100 GB / 100 GB", "500 GB / 500 GB", "250 GB / 250 GB"]},
            {q: "To get Prepaid line, the age limit for Kuwaiti/Non Kuwaiti should not be less than: / العمر المسموح للحصول على خط التعبئة للعميل الكويتي/غيرالكويتي يجب ان لا يكون اقل من:", a: "18 years / 18 سنة", options: ["21 years / 21 سنة", "18 years / 18 سنة", "20 years / 20 سنة", "19 years / 19 سنة"]},
            {q: "The charges to call to Kuwait from any Europian country on roaming are: / رسوم الاتصال الى الكويت بالتجوال من اي دولة اوربية:", a: "1.250 KD / 1.250 KD", options: ["1.250 KD / 1.250 KD", "1.000 KD / 1.000 KD", "0.900 KD / 0.900 KD", "0.600 KD / 0.600 KD"]},
            {q: "Old prepaid plans can migrate to \"go\" plan by sending sms go to ..... / عميل خط التعبئة للباقات( go ) القديمة يستطيع الانتقال الى go باقات ارسال الرساله محتوها :", a: "510 / 510", options: ["567 / 567", "585 / 585", "999 / 999", "510 / 510"]},
            {q: "Postpaid voice 45 KD customers get ....GB of data on Roaming: / سيحصل عملاء باقة 45 د.ك انترنت أثناء التجوال على (...) GB:", a: "10 GB / 10 GB", options: ["10 GB / 10 GB", "5 GB / 5 GB", "3 GB / 3 GB", "1 GB / 1 GB"]},
            {q: "12 kd premimum roaming bundle is activated by: / يتم تفعيل باقة 12 د.ك المميزة للتجوال من خلال:", a: "p1 to 102 / p1 to 102", options: ["p1 to 102 / p1 to 102", "i2 to 102 / i2 to 102", "i3 to 102 / i3 to 102", "i4 to 102 / i4 to 102"]},
            {q: "The hotline number for Fiber services is: / رقم الخط المباشر لخدمة الفايبر:", a: "1827827 / 1827827", options: ["1827278 / 1827278", "1827287 / 1827287", "1827827 / 1827827"]},
            {q: "The customer will be on High-risk profile for any new activation after ......... , becoming medium if the line is not disconnected during this period? / ماهي المدة من انتقال High-risk profile الى MEDIUM-risk profile في حال عدم انقطاع الخط خلال هذه الفترة؟", a: "Three months / 3 أشهر", options: ["One month / شهر واحد", "Two months / شهرين", "Three months / 3 أشهر", "Six months / 6 أشهر"]},
            {q: "MEDIUM-risk profile becomes low after.....? / ماهي المدة من انتقال MEDIUM-risk profile الى Low-risk profile في حال عدم انقطاع الخط خلال هذه الفترة؟", a: "One month / شهر واحد", options: ["One month / شهر واحد", "Two month / شهرين", "Three month / 3 أشهر", "Six month / 6 أشهر"]},
            {q: "Is auto renewal available for 12 KD premium roaming bundle for postpaid voice? / هل يمكن التجديد التلقائي في باقة التجوال المميزة بقيمة 12 د.ك للدفع الأجل الصوتي؟", a: "Yes / صح", options: ["Yes / صح", "No / خطأ"]},

            {q: "What are the requirements for making Device Care claim? / ما هي متطلبات تقديم مطالبة Device Care؟", a: "All of the mentioned / كل ما سبق", options: ["Civil Id/Excess Fee / البطاقة المدنية / الرسوم الزائدة", "Device Care contract Form / نموذج عقد رعاية الجهاز", "All of the mentioned / كل ما سبق", "None of the mentioned / ليس اين مما سبق"]},
            {q: "Device Care Essential service provide customer: / توفر خدمة Device Care Essential للعميل:", a: "Extended Manufacturer Warranty / تمديد لمصنعية الجهاز", options: ["Extended Manufacturer Warranty / تمديد لمصنعية الجهاز", "Screen Damage only / تلف الشاشة فقط", "Full Smartphone change / التغيير الكامل للهاتف الذكي"]},
            {q: "The premium category of stc TV customers get Video Quality of: / يحصل العميل جودة الفيديومن خدمة stc TV: premium باقة", a: "4 K / 4 K", options: ["HD / HD", "Full HD / Full HD", "4 K / 4 K", "8 K / 8 K"]},
            {q: "Can stc Postpaid customers use payment service in the Chatbot? / هل يستطيعون عملاء stc للدفع الآجل استخدام خاصية الدفع من خلال نظام المساعد الآلي؟", a: "Yes / نعم", options: ["Yes / نعم", "No / لا"]},
            {q: "9 kd go prepaid plan provides: / توفر خط الدفع المسبق 9 د.ك:", a: "All of the mentioned / كل ما ذكر", options: ["Unlimited On-net minutes / دقائق غير محدودة داخل الشبكة", "Unlimited Social Media / وسائل التواصل الاجتماعي غير المحدودة", "All of the mentioned / كل ما ذكر", "None of the mentioned / لا شيء من المذكور"]},
            {q: "How long does it take to get ready for a call? / كم مدة الاستعداد للمكالمة:", a: "less than 3 seconds / أقل من 3 ثوان", options: ["less than 3 seconds / أقل من 3 ثوان", "less than 5 seconds / أقل من 5 ثوان", "less than 7 seconds / أقل من 7 ثوان", "None of the above / ليس أيا مما سبق"]},
            {q: "In a call the number of times the customer's name is used: / عدد مرات استخدام اسم العميل:", a: "Thrice or more / ثلاث مرات و اكثر", options: ["Once / مرة", "Twicw / مرتين", "Thrice or more / ثلاث مرات و اكثر", "Not important / غير مهم"]},
            {q: "Allowed waiting time is: / مدة الانتظار المسموحه:", a: "It does not exceed 30 seconds, renewable / لا يتعدى 30 ثانيه قابلة للتجديد", options: ["Waiting is not allowed / الانتظار غير مسموح", "It does not exceed 30 seconds, renewable / لا يتعدى 30 ثانيه قابلة للتجديد", "It does not exceed 40 seconds, renewable / لا يتعدى 40 ثانيه قابلة للتجديد", "It does not exceed 45 seconds, renewable / لا يتعدى 45 ثانيه قابلة للتجديد"]},
            {q: "What is the right way of ending call: / كيف تكون نهاية المكالمة الصحيحة:", a: "Marketing, Offer to provide another service , Greeting at the end of the call / التسويق, العرض لتقديم خدمة أخرى, تحية ختام المكالمة", options: ["Offer to provide another service, Marketing, Greeting at the end of the call / العرض لتقديم خدمة أخرى, التسويق, تحية ختام المكالمة", "Greeting at the end of the call , Offer to provide another service 3- Marketing / تحية ختام المكالمة , العرض لتقديم خدمة أخرى, -التسويق", "Greeting at the end of the call , Marketing , Offer to provide another service / تحية ختام المكالمة , التسويق, العرض لتقديم خدمة أخرى", "Marketing, Offer to provide another service , Greeting at the end of the call / التسويق, العرض لتقديم خدمة أخرى, تحية ختام المكالمة"]},

            {q: "The search bar helps us to find customer’s profile by (BSS System): / يساعدنا شريط البحث في العثور على الملف الشخصي للعميل (BSS System):من خلال", a: "All of the mentioned / جميع ما سبق", options: ["Civil ID number / رقم البطاقة المدنية", "Line number / رقم الاشتراك", "Contract Number / رقم العقد", "All of the mentioned / جميع ما سبق"]},

            {q: "Customers will get up to .... meters of free cable with Baity 5G plan: / سيحصل العملاء على كبل مجاني يصل طوله إلى .... متر مع باقة Baity 5G:", a: "50 meters / 50 متراً", options: ["10 meters / 10 متراً", "20 meters / 20 متراً", "50 meters / 50 متراً", "As per customers need / حسب احتياجات العميل"]},
            {q: "What is the Auto Port-In option? (BSS system) / ما هو خيار Auto Port-In (BSS system)؟", a: "An option that allows the number to be transfer immediately for approval from the company it is being transferred. / خيار يتيح تنفيذ عملية نقل الرقم فوراً دون انتظار موافقة الشركة المحول منها", options: ["An option to cancel the line service permanently / خيار يُستخدم لإلغاء خدمة الخط بشكل نهائي", "An option that allows the number to be transfer immediately for approval from the company it is being transferred. / خيار يتيح تنفيذ عملية نقل الرقم فوراً دون انتظار موافقة الشركة المحول منها", "An option dedicated to change the internet plan only / خيار مخصص لتغيير باقة الإنترنت فقط"]},
            {q: "What are the allowed months to transfer the line from prepaid to postpaid? / ماهي عدد الأشهر المسموحة للتحويل الخط من الدفع المسبق إلى الدفع الأجل؟", a: "Three months / ثلاث أشهر", options: ["One month / شهر", "Two months / إثنان شهر", "Three months / ثلاث أشهر", "None of the mentioned / ليس مما سبق"]}
        ];

        // --- CORE FUNCTIONS ---
        function handleLogin() {
            const name = document.getElementById('login-name').value.trim();
            if(!name) {
                document.getElementById('login-error').classList.remove('hidden');
                return;
            }
            userName = name;
            
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
                document.getElementById('main-app').style.pointerEvents = 'auto';
                showMenu();
            }, 500);
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            document.getElementById('lang-toggle').innerText = currentLang === 'ar' ? 'EN' : 'AR';
            document.getElementById('chat-input').placeholder = currentLang === 'ar' ? 'اكتب سؤالك هنا...' : 'Type your question here...';
            
            if(!isQuizMode) {
                document.getElementById('current-flow-text').innerText = currentLang === 'ar' ? 'عام / General' : 'General AI';
            }
        }

        function showMenu() {
            isQuizMode = false;
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            
            document.getElementById('chat-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            
            let greeting = currentLang === 'ar' 
                ? `يا هلا وغلا بـ <span class="font-bold text-[#8A2BE2]">${userName}</span>! نورتنا يا بطل 💜<br><br>اختار من القائمة عشان نبدع:`
                : `Welcome, <span class="font-bold text-[#8A2BE2]">${userName}</span>! Great to have you here 💜<br><br>Choose from the menu:`;
            
            printBotMessage(greeting, false);

            const menu = `
                <div class="flow-grid">
                    <button onclick="setFlow('Call Center')" class="flow-pill"><i class="fa-solid fa-headset text-[#8A2BE2]"></i> Call Center</button>
                    <button onclick="startQuiz()" class="flow-pill"><i class="fa-solid fa-graduation-cap text-[#8A2BE2]"></i> ${currentLang === 'ar' ? 'اختبار / Quiz' : 'Start Quiz'}</button>
                    <button onclick="toggleLang()" class="flow-pill"><i class="fa-solid fa-language text-[#8A2BE2]"></i> Language / اللغة</button>
                </div>
            `;
            printBotMessage(menu, false);
        }

        function setFlow(flow) {
            addUserMessage(flow);
            const typing = showThinking();
            
            setTimeout(() => {
                typing.remove();
                document.getElementById('current-flow-text').innerText = flow;
                
                let followUp = currentLang === 'ar'
                    ? `كفو! مسار <strong>Call Center</strong> جاهز. اسألني أي سؤال أو اضغط على (اختبار) للتدريب! 🔥`
                    : `Awesome! <strong>Call Center</strong> loaded. Ask a question or type (test)! 🔥`;
                    
                printBotMessage(followUp, false);
            }, 800);
        }

        // --- SEARCH ENGINE BILINGUAL LOGIC ---
        function getLocalizedText(text, isArabicQuery) {
            if (!text) return "";
            let parts = text.split(" / ");
            if (parts.length === 1) return parts[0].trim();
            // If query is Arabic, return Arabic part (index 1), else English part (index 0)
            return isArabicQuery ? (parts[1] ? parts[1].trim() : parts[0].trim()) : parts[0].trim();
        }

        function handleInput() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            addUserMessage(text);
            input.value = "";

            if(isQuizMode) {
                printBotMessage(currentLang === 'ar' ? 'يرجى اختيار إحدى الإجابات من الخيارات أعلاه.' : 'Please select an option above.', false);
                return;
            }

            const typing = showThinking();
            let query = text.toLowerCase();

            // Detect Language of User Input
            const isArabicQuery = /[\u0600-\u06FF]/.test(query);

            if(['test', 'quiz', 'اختبار'].some(w => query.includes(w))) {
                setTimeout(() => { typing.remove(); startQuiz(); }, 800);
                return;
            }

            setTimeout(() => {
                typing.remove();
                let pool = originalKnowledge;
                let words = query.split(" ").filter(w => w.length > 2);
                if(words.length === 0) words = [query];

                let matches = [];
                for(let i=0; i<pool.length; i++) {
                    let score = 0;
                    let qTextFull = pool[i].q.toLowerCase();
                    for(let w of words) {
                        if(qTextFull.includes(w)) score++;
                    }
                    if(score > 0) matches.push({item: pool[i], score: score});
                }
                
                matches.sort((a,b) => b.score - a.score);

                if(matches.length === 0) {
                    printBotMessage(currentLang === 'ar' ? 'عذراً، ما لقيت إجابة دقيقة. ياليت توضح سؤالك!' : 'Sorry, no exact match found. Please clarify!', false);
                } else if(matches.length === 1 || matches[0].score > (matches[1]?.score || 0) + 1) {
                    let locQ = getLocalizedText(matches[0].item.q, isArabicQuery);
                    let locA = getLocalizedText(matches[0].item.a, isArabicQuery);
                    
                    let ans = `<div class="opacity-60 text-xs mb-2 pb-2 border-b border-[#333]" dir="${isArabicQuery?'rtl':'ltr'}">${locQ}</div>`;
                    ans += `<strong dir="${isArabicQuery?'rtl':'ltr'}">${locA}</strong>`;
                    printBotMessage(ans, true);
                } else {
                    let top = matches.slice(0, 4);
                    let title = currentLang === 'ar' ? 'لقد وجدت أكثر من سؤال، اختر:' : 'Multiple matches found. Select one:';
                    let html = `<p class="mb-3 text-[#8A2BE2] font-bold">${title}</p><div class="flex flex-col gap-2">`;
                    
                    top.forEach((m, idx) => {
                        let locQ = getLocalizedText(m.item.q, isArabicQuery).replace(/'/g, "\\'");
                        let locA = getLocalizedText(m.item.a, isArabicQuery).replace(/'/g, "\\'");
                        html += `<button onclick="forceAns('${locQ}', '${locA}', ${isArabicQuery})" class="flow-pill w-full text-right bg-[#1a1a1a]" dir="${isArabicQuery?'rtl':'ltr'}">${locQ}</button>`;
                    });
                    html += `</div>`;
                    printBotMessage(html, false);
                }
            }, 800);
        }

        window.forceAns = function(q, a, isAr) {
            addUserMessage(q);
            const typing = showThinking();
            setTimeout(() => {
                typing.remove();
                printBotMessage(`<div class="opacity-60 text-xs mb-2 pb-2 border-b border-[#333]" dir="${isAr?'rtl':'ltr'}">${q}</div><strong dir="${isAr?'rtl':'ltr'}">${a}</strong>`, true);
            }, 600);
        }

        document.getElementById('chat-input').addEventListener('input', e => {
            document.getElementById('send-btn').disabled = e.target.value.trim() === '';
        });
        document.getElementById('chat-input').addEventListener('keypress', e => {
            if(e.key === 'Enter' && !document.getElementById('send-btn').disabled) handleInput();
        });

        // --- QUIZ ENGINE ---
        function startQuiz() {
            isQuizMode = true;
            document.getElementById('chat-box').innerHTML = '';
            document.getElementById('current-flow-text').innerText = currentLang === 'ar' ? 'وضع الاختبار 🎓' : 'Quiz Mode 🎓';
            
            let shuffled = [...originalKnowledge].sort(() => 0.5 - Math.random());
            quizPool = shuffled.slice(0, 25);
            quizScore = 0; quizAttempts = 0; cheatWarnings = 0;

            timeLeft = 900;
            document.getElementById('timer-display').classList.remove('hidden');
            updateTimer();
            quizTimer = setInterval(() => {
                timeLeft--; updateTimer();
                if(timeLeft <= 0) failQuiz("Time out");
            }, 1000);

            printBotMessage(currentLang === 'ar' ? "<strong class='text-[#8A2BE2]'>بدأ الاختبار!</strong> 15 دقيقة و 25 سؤال." : "<strong class='text-[#8A2BE2]'>Quiz Started!</strong> 15 mins, 25 questions.", false);
            askQuestion();
        }

        function updateTimer() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function failQuiz(reason) {
            endQuizState();
            printBotMessage(currentLang === 'ar' ? "❌ <strong>تم إلغاء الاختبار!</strong>" : "❌ <strong>Quiz Terminated!</strong>", false);
        }

        function endQuizState() {
            isQuizMode = false;
            clearInterval(quizTimer);
            document.getElementById('timer-display').classList.add('hidden');
            document.getElementById('current-flow-text').innerText = "Call Center";
        }

        function askQuestion() {
            if(quizAttempts >= quizPool.length) { finishQuiz(); return; }

            let item = quizPool[quizAttempts];
            let choices = [...item.options];

            let html = `<div class="font-bold mb-4" dir="${currentLang==='en'?'ltr':'rtl'}">${quizAttempts + 1}. ${getLocalizedText(item.q, currentLang === 'ar')}</div><div class="flex flex-col gap-2">`;
            
            for(let c of choices) {
                let safeC = c.replace(/'/g, "\\'");
                let isCorrect = (c === item.a);
                html += `<button onclick="handleOption('${safeC}', ${isCorrect})" class="flow-pill w-full text-right ${currentLang==='en'?'text-left':''}" style="justify-content: ${currentLang==='en'?'flex-start':'flex-start'}; border-radius: 8px;" dir="${currentLang==='en'?'ltr':'rtl'}">${getLocalizedText(c, currentLang === 'ar')}</button>`;
            }
            html += `</div>`;
            setTimeout(() => { printBotMessage(html, false); }, 600);
        }

        window.handleOption = function(selected, isCorrect) {
            addUserMessage(getLocalizedText(selected, currentLang === 'ar'));
            const typing = showThinking();
            
            setTimeout(() => {
                typing.remove();
                if(isCorrect) {
                    quizScore++;
                    printBotMessage(`✅ <strong>${currentLang==='ar'?'إجابة صحيحة!':'Correct!'}</strong> 👏<br><span class="text-xs text-[#32D74B]">${quizScore}/${quizAttempts+1}</span>`, false);
                } else {
                    let msg = currentLang === 'ar' ? 'الجواب الصحيح:' : 'Correct Answer:';
                    printBotMessage(`❌ <strong>${currentLang==='ar'?'إجابة خاطئة.':'Incorrect.'}</strong><br><br><span class="bg-[#1a1a1a] p-2 rounded block border border-[#333]">${msg}<br>${getLocalizedText(quizPool[quizAttempts].a, currentLang==='ar')}</span><br><span class="text-xs opacity-70">${quizScore}/${quizAttempts+1}</span>`, false);
                }
                quizAttempts++;
                setTimeout(() => { askQuestion(); }, 2000);
            }, 800);
        }

        function finishQuiz() {
            let pct = (quizScore / quizAttempts) * 100;
            let msg = "";
            if (pct >= 96) msg = currentLang === 'ar' ? "🌟 <strong>ممتاز!</strong>" : "🌟 <strong>Excellent!</strong>";
            else if (pct >= 80) msg = currentLang === 'ar' ? "👍 <strong>جيد!</strong>" : "👍 <strong>Good!</strong>";
            else msg = currentLang === 'ar' ? "💔 <strong>رسوب</strong>" : "💔 <strong>Failed</strong>";

            let finalHtml = `${msg}<br><br><div class="bg-[#1a1a1a] border border-[#333] p-4 text-center text-xl font-bold rounded-xl">${quizScore} / ${quizAttempts} (${Math.round(pct)}%)</div>`;
            
            endQuizState();
            printBotMessage(finalHtml, false);
        }

        // --- UTILS ---
        function scrollToBottom() {
            const box = document.getElementById('chat-box');
            box.scrollTop = box.scrollHeight;
        }
        function addUserMessage(text) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="msg-bubble msg-user">${text}</div>`;
            scrollToBottom();
        }
        function showThinking() {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = "msg-bubble msg-bot typing-indicator";
            div.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
            box.appendChild(div);
            scrollToBottom();
            return div;
        }
        function printBotMessage(html, appendHelp) {
            const box = document.getElementById('chat-box');
            let helpTxt = currentLang === 'ar' ? "<br><br><span class='text-[11px] opacity-50 block'>هل أستطيع مساعدتك بأي شيء آخر؟</span>" : "<br><br><span class='text-[11px] opacity-50 block'>Anything else I can help with?</span>";
            box.innerHTML += `<div class="msg-bubble msg-bot flex gap-3">
                <div class="shrink-0 pt-1 text-[#8A2BE2]"><i class="fa-solid fa-robot"></i></div>
                <div class="w-full">${html} ${appendHelp ? helpTxt : ''}</div>
            </div>`;
            scrollToBottom();
        }
    </script>
</body>
</html>
