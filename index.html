<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zbibo Quiz Assistance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
        
        :root {
            --bg-main: #040008; 
            --neon-purple: #BF5AF2;
            --neon-magenta: #FF29FF;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.6);
            --apple-glass: rgba(20, 10, 30, 0.4);
            --apple-border: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            margin: 0; padding: 0; overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* AMBIENT BACKGROUND ORBS */
        .ambient-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; overflow: hidden; background: var(--bg-main); }
        .orb-1 {
            position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(191,90,242,0.3) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; filter: blur(60px); animation: float 15s ease-in-out infinite alternate;
        }
        .orb-2 {
            position: absolute; bottom: -10%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(255,41,255,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; filter: blur(80px); animation: float 20s ease-in-out infinite alternate-reverse;
        }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(5%, 10%) scale(1.1); } 100% { transform: translate(-5%, -5%) scale(0.95); } }
        
        /* APPLE GLASSMORPHISM */
        .apple-glass {
            background: var(--apple-glass); backdrop-filter: blur(35px) saturate(200%); -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid var(--apple-border); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .chat-header { background: rgba(10, 5, 20, 0.5); backdrop-filter: blur(40px); border-bottom: 1px solid var(--apple-border); }

        /* BUBBLES */
        .bot-msg { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); color: var(--text-main); border-radius: 24px; }
        .user-msg { background: linear-gradient(135deg, #BF5AF2 0%, #6E00B3 100%); color: #ffffff; border-radius: 24px; box-shadow: 0 10px 25px rgba(191, 90, 242, 0.3); }

        ::-webkit-scrollbar { width: 4px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: #BF5AF2; border-radius: 10px; }
        .chat-container { height: calc(100vh - 85px); scroll-behavior: smooth; padding-bottom: 130px !important; }
        
        .message { animation: springUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards; transform-origin: bottom; }
        @keyframes springUp { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .typing-indicator { display: flex; gap: 5px; padding: 16px 20px; align-items: center; width: fit-content; }
        .dot { width: 6px; height: 6px; background-color: var(--text-muted); border-radius: 50%; animation: iosBounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes iosBounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.3; } 40% { transform: translateY(-5px); opacity: 1; } }
        
        /* INPUT DOCK */
        .input-dock { background: linear-gradient(to top, var(--bg-main) 40%, transparent); }
        .pill-input-wrapper { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(30px); border: 1px solid var(--apple-border); box-shadow: 0 10px 40px rgba(0,0,0,0.6); }

        .pill-btn { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); color: var(--text-main); border: 1px solid var(--apple-border); 
            border-radius: 9999px; padding: 14px 28px; font-weight: 500; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2); cursor: pointer;
        }
        .pill-btn:hover { background: var(--neon-purple); color: #ffffff; border-color: transparent; box-shadow: 0 10px 30px rgba(191, 90, 242, 0.5); transform: scale(1.03) translateY(-2px); }
        
        .action-icon { color: var(--text-muted); transition: all 0.3s ease; }
        .action-icon:hover { color: var(--text-main); transform: scale(1.1); }

        .send-btn-ios { background-color: var(--neon-purple); box-shadow: 0 4px 15px rgba(191, 90, 242, 0.4); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2); }
        .send-btn-ios:hover:not(:disabled) { transform: scale(1.1); background-color: #D57FF5; box-shadow: 0 8px 25px rgba(191, 90, 242, 0.6); }
        .send-btn-ios:disabled { background-color: rgba(255,255,255,0.1); box-shadow: none; color: rgba(255,255,255,0.3); }
        
        .timer-badge { background: rgba(255, 69, 58, 0.1); border: 1px solid rgba(255, 69, 58, 0.3); color: #FF453A; padding: 4px 12px; border-radius: 99px; font-weight: 500; font-size: 0.85rem; display: none; align-items: center; gap: 6px; backdrop-filter: blur(10px); }

        /* ADMIN TABS */
        .admin-tab { padding: 10px 20px; border-bottom: 2px solid transparent; cursor: pointer; color: var(--text-muted); transition: 0.3s; }
        .admin-tab.active { color: var(--neon-purple); border-bottom: 2px solid var(--neon-purple); font-weight: bold; }
        .admin-content { display: none; }
        .admin-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col h-screen" onload="initApp()">

    <!-- Ambient Glowing Background -->
    <div class="ambient-bg"><div class="orb-1"></div><div class="orb-2"></div></div>

    <!-- SECURE LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 z-[100] flex items-center justify-center transition-opacity duration-1000 p-4">
        <div class="apple-glass rounded-[32px] p-10 max-w-sm w-full flex flex-col gap-6 items-center text-center relative overflow-hidden">
            
            <div class="flex flex-col items-center gap-2">
                <div class="h-16 w-16 bg-white rounded-[20px] flex items-center justify-center overflow-hidden shadow-xl mb-2">
                    <img src="image_9004c3.jpg" alt="Logo" class="h-10 object-contain">
                </div>
                <h2 class="text-2xl font-light tracking-wide text-white">Zbibo Portal</h2>
                <p id="login-subtitle" class="text-xs font-light tracking-widest text-[#BF5AF2] uppercase">User Access</p>
            </div>
            
            <!-- User Login Form -->
            <div id="user-login-form" class="w-full flex flex-col gap-3 transition-all duration-500">
                <input type="text" id="login-user" class="w-full rounded-[20px] px-6 py-4 focus:outline-none transition text-center bg-black/20 border border-white/10 text-white placeholder-white/30 focus:border-[#BF5AF2] focus:bg-black/40 font-medium text-lg" placeholder="أدخل اسمك / Your Name" onkeypress="if(event.key === 'Enter') handleUserLogin()">
                <button onclick="handleUserLogin()" class="w-full bg-white text-black hover:bg-[#BF5AF2] hover:text-white py-4 rounded-[20px] font-bold text-md transition-all duration-300 active:scale-95 shadow-lg">Start Session</button>
            </div>

            <!-- Admin Login Form (Hidden by default) -->
            <div id="admin-login-form" class="w-full hidden flex-col gap-3 transition-all duration-500">
                <input type="text" id="admin-user" class="w-full rounded-[20px] px-6 py-3 focus:outline-none transition text-center bg-black/20 border border-[#FF453A]/50 text-white placeholder-white/30 focus:border-[#FF453A]" placeholder="Username" dir="ltr">
                <input type="password" id="admin-pass" class="w-full rounded-[20px] px-6 py-3 focus:outline-none transition text-center bg-black/20 border border-[#FF453A]/50 text-white placeholder-white/30 focus:border-[#FF453A]" placeholder="Password" dir="ltr" onkeypress="if(event.key === 'Enter') handleAdminLogin()">
                <button onclick="handleAdminLogin()" class="w-full bg-[#FF453A] text-white hover:bg-[#ff6961] py-4 rounded-[20px] font-bold text-md transition-all duration-300 active:scale-95 shadow-lg mt-2">Unlock Dashboard</button>
            </div>
            
            <p id="login-error" class="text-[#FF453A] text-xs hidden font-medium tracking-wide">Invalid entry.</p>

            <button onclick="toggleLoginMode()" class="text-xs text-white/30 hover:text-white/80 transition-all absolute bottom-4">Admin Access</button>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="main-app" class="flex flex-col h-screen opacity-0 transition-opacity duration-1000 pointer-events-none relative">
        
        <!-- HEADER -->
        <header class="chat-header p-3 sm:px-6 flex justify-between items-center absolute top-0 w-full z-40">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 bg-white rounded-[12px] flex items-center justify-center overflow-hidden">
                    <img src="image_9004c3.jpg" alt="Logo" class="h-6 object-contain">
                </div>
                <div class="flex flex-col">
                    <h1 class="text-md font-medium tracking-wide text-white">Zbibo Quiz Assistance</h1>
                    <div class="flex items-center gap-2 mt-0.5">
                        <p class="text-[10px] uppercase tracking-widest text-[#BF5AF2]" id="mode-subtitle">Call Center</p>
                        <div id="quiz-timer" class="timer-badge"><i class="fa-regular fa-clock"></i> <span id="time-display">15:00</span></div>
                    </div>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="toggleLanguage()" id="lang-btn" class="action-icon text-xs font-bold tracking-widest uppercase">EN</button>
                <button onclick="handleNavigation('home')" class="action-icon"><i class="fa-solid fa-layer-group"></i></button>
                <button onclick="handleNavigation('quiz')" class="action-icon" id="quiz-btn"><i class="fa-solid fa-graduation-cap"></i></button>
            </div>
        </header>

        <!-- CHAT AREA -->
        <main class="flex-grow flex justify-center relative w-full pt-20">
            <div class="w-full max-w-4xl flex flex-col relative h-full">
                <div id="chat-box" class="chat-container p-4 sm:p-6 flex flex-col gap-5 w-full"></div>
                
                <!-- FLOATING DOCKED INPUT -->
                <div class="absolute bottom-0 w-full p-4 sm:px-6 input-dock z-40 pb-8">
                    <div class="pill-input-wrapper rounded-full flex items-center p-1.5 gap-2 w-full mx-auto">
                        <input type="text" id="user-input" class="flex-grow bg-transparent border-none text-white px-5 py-3 focus:outline-none placeholder-white/30 text-md font-medium" placeholder="اسألني أي شيء..." disabled>
                        <button onclick="handleSend()" id="send-btn" class="send-btn-ios w-10 h-10 rounded-full flex items-center justify-center text-white shrink-0" disabled>
                            <i class="fa-solid fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- LIVE ADMIN DASHBOARD (Exclusive Zbibo Access) -->
        <div id="admin-modal" class="absolute inset-0 z-50 hidden items-center justify-center p-4 bg-black/80 backdrop-blur-3xl">
            <div class="apple-glass rounded-[32px] p-8 max-w-5xl w-full max-h-[95vh] flex flex-col">
                <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                    <div>
                        <h2 class="text-2xl font-bold text-white tracking-wide">Zbibo Command Center</h2>
                        <p class="text-xs text-[#BF5AF2] uppercase tracking-widest mt-1">Admin: ahmad.zbibo</p>
                    </div>
                    <button onclick="closeAdmin()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition text-white"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <!-- Tabs -->
                <div class="flex gap-4 mb-6 border-b border-white/10">
                    <div class="admin-tab active" onclick="switchTab('tab-users', this)"><i class="fa-solid fa-users"></i> Online Users</div>
                    <div class="admin-tab" onclick="switchTab('tab-questions', this)"><i class="fa-solid fa-plus-circle"></i> Custom Questions</div>
                    <div class="admin-tab" onclick="switchTab('tab-history', this)"><i class="fa-solid fa-clock-rotate-left"></i> Chat History</div>
                </div>

                <!-- Tab 1: Users -->
                <div id="tab-users" class="admin-content active flex-grow overflow-y-auto pr-2">
                    <h3 class="text-sm font-medium text-white/60 uppercase tracking-widest mb-4">Active User Sessions</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="users-list">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Tab 2: Custom Questions -->
                <div id="tab-questions" class="admin-content flex-grow overflow-y-auto pr-2">
                    <div class="bg-black/30 p-5 rounded-2xl border border-white/10 mb-6">
                        <h3 class="text-sm font-medium text-[#BF5AF2] uppercase tracking-widest mb-4">Add New Knowledge</h3>
                        <input type="text" id="new-q" class="w-full bg-black/50 border border-white/20 rounded-xl p-3 text-white mb-3 outline-none focus:border-[#BF5AF2]" placeholder="Enter Question (e.g. What is Fiber? / ما هو الفايبر؟)">
                        <input type="text" id="new-a" class="w-full bg-black/50 border border-white/20 rounded-xl p-3 text-white mb-3 outline-none focus:border-[#BF5AF2]" placeholder="Enter Answer (e.g. High speed internet / انترنت سريع)">
                        <button onclick="saveCustomQuestion()" class="bg-[#BF5AF2] text-white px-6 py-2 rounded-xl font-bold hover:bg-[#D57FF5] transition">Save to Database</button>
                    </div>
                    <h3 class="text-sm font-medium text-white/60 uppercase tracking-widest mb-4">Your Custom Questions</h3>
                    <div id="custom-q-list" class="flex flex-col gap-3">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Tab 3: History -->
                <div id="tab-history" class="admin-content flex-grow overflow-y-auto pr-2">
                    <h3 class="text-sm font-medium text-white/60 uppercase tracking-widest mb-4">Global Search & Chat Log</h3>
                    <div class="bg-black/20 border border-white/5 rounded-[24px] p-4 flex flex-col gap-3" id="global-history-log">
                        <!-- Populated by JS -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- 1. DATA & STATE MANAGEMENT ---
        let currentLang = 'ar';
        let userName = "";
        let isQuizMode = false;
        
        let quizScore = 0; let quizAttempts = 0; let quizPool = [];
        let cheatWarnings = 0; let quizTimer; let timeLeft = 900;

        // --- LOCAL DATABASE SYSTEM (Mock Backend using localStorage) ---
        function getDB(key) { return JSON.parse(localStorage.getItem(key) || '[]'); }
        function setDB(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

        // Track user login
        function recordUserPresence(name) {
            let users = getDB('zbibo_users');
            let existing = users.find(u => u.name === name);
            let now = new Date().toLocaleString();
            if(existing) { existing.lastSeen = now; } 
            else { users.unshift({name: name, lastSeen: now}); }
            setDB('zbibo_users', users);
        }

        // Track chat history
        function recordChatHistory(name, query) {
            let history = getDB('zbibo_history');
            history.unshift({name: name, query: query, time: new Date().toLocaleTimeString()});
            setDB('zbibo_history', history);
        }

        // --- THE ORIGINAL 102 QUESTIONS ---
        const baseKnowledge = [
            {q: "How many days the Prepaid line will stay on Grace? / كم يوم يبقى الخط في Grace؟", a: "30 days / 30 يوم", options: ["60 days / 60 يوم", "30 days / 30 يوم", "20 days / 20 يوم", "45 days / 45 يوم"]},
            {q: "What is internet capacity in 25 KD voice package? / ما هي سعة الانترنت في باقة ال 25 الصوتية؟", a: "100 GB / 100 GB", options: ["10 GB / 10 GB", "25 GB / 25 GB", "50 GB / 50 GB", "100 GB / 100 GB"]},
            {q: "How much does a temporary suspension service cost for a month (summer suspension)? / كم هي تكلفة خدمة الايقاف المؤقت لمدة شهر؟", a: "None of the mentioned / ليس أي مما سبق", options: ["15 KD / 15 KD", "20 KD / 20 KD", "25 KD / 25 KD", "None of the mentioned / ليس أي مما سبق"]},
            {q: "The validity of points in qitaf program is? / صلاحية النقاط في برنامج قطاف هي؟", a: "12 months / 12 شهر", options: ["3 months / 3 أشهر", "12 months / 12 شهر", "18 months / 18 شهر", "24 months / 24 شهر"]},
            {q: "The cost for transfer ownership for postpaid line: / كم تكلفة نقل الملكية لخطوط الدفع الآجل؟", a: "5 KD / 5 KD", options: ["5 KD / 5 KD", "10 KD / 10 KD", "15 KD / 15 KD", "20 KD / 20 KD"]},
            {q: "To cancel Budget control service: / لإلغاء خدمة ال Budget Control:", a: "#550# / #550#", options: ["#550# / #550#", "#505# / #505#", "*550# / *550#", "*505# / *505#"]},
            {q: "Postpaid data customer will get .....GBs with 5KD booster: / خدمة الانترنت الاضافي لباقات الدفع الآجل الانترنت تمنح 5 KD (...) GBs:", a: "250 GB / 250 GB", options: ["100 GB / 100 GB", "500 GB / 500 GB", "250 GB / 250 GB"]},
            {q: "To get Prepaid line, the age limit for Kuwaiti/Non Kuwaiti should not be less than: / العمر المسموح للحصول على خط التعبئة للعميل الكويتي/غيرالكويتي يجب ان لا يكون اقل من:", a: "18 years / 18 سنة", options: ["21 years / 21 سنة", "18 years / 18 سنة", "20 years / 20 سنة", "19 years / 19 سنة"]},
            {q: "The charges to call to Kuwait from any Europian country on roaming are: / رسوم الاتصال الى الكويت بالتجوال من اي دولة اوربية:", a: "1.250 KD / 1.250 KD", options: ["1.250 KD / 1.250 KD", "1.000 KD / 1.000 KD", "0.900 KD / 0.900 KD", "0.600 KD / 0.600 KD"]},
            {q: "Old prepaid plans can migrate to \"go\" plan by sending sms go to ..... / عميل خط التعبئة للباقات( go ) القديمة يستطيع الانتقال الى go باقات ارسال الرساله محتوها :", a: "510 / 510", options: ["567 / 567", "585 / 585", "999 / 999", "510 / 510"]},
            {q: "Postpaid voice 45 KD customers get ....GB of data on Roaming: / سيحصل عملاء باقة 45 د.ك انترنت أثناء التجوال على (...) GB:", a: "10 GB / 10 GB", options: ["10 GB / 10 GB", "5 GB / 5 GB", "3 GB / 3 GB", "1 GB / 1 GB"]},
            {q: "12 kd premimum roaming bundle is activated by: / يتم تفعيل باقة 12 د.ك المميزة للتجوال من خلال:", a: "p1 to 102 / p1 to 102", options: ["p1 to 102 / p1 to 102", "i2 to 102 / i2 to 102", "i3 to 102 / i3 to 102", "i4 to 102 / i4 to 102"]},
            {q: "The hotline number for Fiber services is: / رقم الخط المباشر لخدمة الفايبر:", a: "1827827 / 1827827", options: ["1827278 / 1827278", "1827287 / 1827287", "1827827 / 1827827"]},
            {q: "The customer will be on High-risk profile for any new activation after ......... , becoming medium if the line is not disconnected during this period? / ماهي المدة من انتقال High-risk profile الى MEDIUM-risk profile في حال عدم انقطاع الخط خلال هذه الفترة؟", a: "Three months / 3 أشهر", options: ["One month / شهر واحد", "Two months / شهرين", "Three months / 3 أشهر", "Six months / 6 أشهر"]},
            {q: "MEDIUM-risk profile becomes low after.....? / ماهي المدة من انتقال MEDIUM-risk profile الى Low-risk profile في حال عدم انقطاع الخط خلال هذه الفترة؟", a: "One month / شهر واحد", options: ["One month / شهر واحد", "Two month / شهرين", "Three month / 3 أشهر", "Six month / 6 أشهر"]},
            {q: "Is auto renewal available for 12 KD premium roaming bundle for postpaid voice? / هل يمكن التجديد التلقائي في باقة التجوال المميزة بقيمة 12 د.ك للدفع الأجل الصوتي؟", a: "Yes / صح", options: ["Yes / صح", "No / خطأ"]},
            {q: "Deactivation Code for 12 KD premium Roaming bundle is: / لإلغاء باقة التجوال المميزة بقيمة 12 د.ك ارسال رساله نصيه هي:", a: "D to 102 / إلى 102 D", options: ["0p1 to 102 / إلى 102 0p1", "0p1 to 567 / إلى 567 0p1", "D to 102 / إلى 102 D", "012 to 102 / إلى 102 012"]},
            {q: "In 12 KD premium roaming bundle, customer can have roaming SMS's: / في باقة التجوال المميزة بقيمة 12 د.ك يمكن للعميل الحصول على رسائل التجوال القصيرة:", a: "30 SMS / 30 SMS", options: ["100 SMS / 100 SMS", "50 SMS / 50 SMS", "30 SMS / 30 SMS", "25 SMS / 25 SMS"]},
            {q: "What are the requirements for making Device Care claim? / ما هي متطلبات تقديم مطالبة Device Care؟", a: "All of the mentioned / كل ما سبق", options: ["Civil Id/Excess Fee / البطاقة المدنية / الرسوم الزائدة", "Device Care contract Form / نموذج عقد رعاية الجهاز", "All of the mentioned / كل ما سبق", "None of the mentioned / ليس اين مما سبق"]},
            {q: "Device Care Essential service provide customer: / توفر خدمة Device Care Essential للعميل:", a: "Extended Manufacturer Warranty / تمديد لمصنعية الجهاز", options: ["Extended Manufacturer Warranty / تمديد لمصنعية الجهاز", "Screen Damage only / تلف الشاشة فقط", "Full Smartphone change / التغيير الكامل للهاتف الذكي"]},
            {q: "The premium category of stc TV customers get Video Quality of: / يحصل العميل جودة الفيديومن خدمة stc TV: premium باقة", a: "4 K / 4 K", options: ["HD / HD", "Full HD / Full HD", "4 K / 4 K", "8 K / 8 K"]},

        // --- 5. SEARCH ENGINE ---
        function handleInput() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            addUserMessage(text);
            input.value = "";
            document.getElementById('send-btn').disabled = true;

            recordChatHistory(userName, text); // Record in DB

            if(isQuizMode) {
                printBotMessage(uiText[currentLang].useOptions, false);
                return;
            }

            const typing = showThinking();
            let query = text.toLowerCase();
            const isArabicQuery = /[\u0600-\u06FF]/.test(query);

            for(let cat of chitChatCategories) {
                if(cat.words.some(w => new RegExp(`(?:^|\\s)${w}(?:\\s|$)`, 'i').test(query))) {
                    setTimeout(() => { typing.remove(); printBotMessage(cat.reply, false); }, 800);
                    return;
                }
            }

            if(['test', 'quiz', 'اختبار'].some(w => query.includes(w))) {
                setTimeout(() => { typing.remove(); startQuiz(); }, 800);
                return;
            }

            setTimeout(() => {
                typing.remove();
                let pool = getActiveKnowledge();
                let words = query.split(" ").filter(w => w.length > 2);
                if(words.length === 0) words = [query];

                let matches = [];
                for(let i=0; i<pool.length; i++) {
                    let score = 0;
                    let qTextFull = pool[i].q.toLowerCase();
                    for(let w of words) {
                        if(qTextFull.includes(w)) score++;
                    }
                    if(score > 0) matches.push({item: pool[i], score: score});
                }
                
                matches.sort((a,b) => b.score - a.score);
                let targetLang = isArabicQuery ? 'ar' : 'en';

                if(matches.length === 0) {
                    printBotMessage(uiText[currentLang].notFound, false);
                } else if(matches.length === 1 || matches[0].score > (matches[1]?.score || 0) + 1) {
                    let locQ = getLocalizedText(matches[0].item.q, targetLang);
                    let locA = getLocalizedText(matches[0].item.a, targetLang);
                    let ans = `<div class="opacity-60 text-xs mb-2 pb-2 border-b border-[#333]" dir="${targetLang==='ar'?'rtl':'ltr'}">${locQ}</div>`;
                    ans += `<strong dir="${targetLang==='ar'?'rtl':'ltr'}">${locA}</strong>`;
                    printBotMessage(ans, true);
                } else {
                    let top = matches.slice(0, 4);
                    let title = targetLang === 'ar' ? 'لقد وجدت أكثر من سؤال، اختر:' : 'Multiple matches found. Select one:';
                    let html = `<p class="mb-3 text-[#8A2BE2] font-bold">${title}</p><div class="flex flex-col gap-2">`;
                    
                    top.forEach(m => {
                        let locQ = getLocalizedText(m.item.q, targetLang).replace(/'/g, "\\'");
                        let locA = getLocalizedText(m.item.a, targetLang).replace(/'/g, "\\'");
                        html += `<button onclick="forceAns('${locQ}', '${locA}', '${targetLang}')" class="flow-pill w-full text-right bg-[#1a1a1a]" dir="${targetLang==='ar'?'rtl':'ltr'}">${locQ}</button>`;
                    });
                    html += `</div>`;
                    printBotMessage(html, false);
                }
            }, 800);
        }

        window.forceAns = function(q, a, targetLang) {
            addUserMessage(q);

            }, 600);
        }

            quizScore = 0; quizAttempts = 0; cheatWarnings = 0;

            timeLeft = 900;
            document.getElementById('quiz-timer').classList.remove('hidden');
            updateTimer();
            quizTimer = setInterval(() => {
                timeLeft--; updateTimer();
                if(timeLeft <= 0) failQuiz();
            }, 1000);

            printBotMessage(uiText[currentLang].quizStart, false);
            askQuestion();
        }

        function updateTimer() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('quiz-timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function failQuiz() {
            endQuizState();
            printBotMessage(uiText[currentLang].cheatFail, false);
        }

        function endQuizState() {
            isQuizMode = false;
            clearInterval(quizTimer);
            document.getElementById('quiz-timer').classList.add('hidden');
            document.getElementById('current-flow-text').innerText = "Call Center";
            if(window.location.hash === '#quiz') history.replaceState(null, document.title, window.location.pathname);
        }

        function askQuestion() {
            if(quizAttempts >= quizPool.length) { finishQuiz(); return; }

            let item = quizPool[quizAttempts];
            
            // If the item is a custom question without options, generate dummy options
            let choices = [];
            if(item.options && item.options.length > 0) {
                choices = [...item.options];
            } else {
                choices = [item.a];
                let pool = getActiveKnowledge();
                let similar = pool.filter(i => i.a !== item.a);
                let count = 0;
                while(choices.length < 4 && count < 50) {
                    let rand = similar[Math.floor(Math.random() * similar.length)].a;
                    if(!choices.includes(rand)) choices.push(rand);
                    count++;
                }
                choices.sort(() => Math.random() - 0.5);
            }

            let html = `<div class="font-bold mb-4" dir="${currentLang==='en'?'ltr':'rtl'}">${quizAttempts + 1}. ${getLocalizedText(item.q, currentLang)}</div><div class="flex flex-col gap-2">`;
            
            for(let c of choices) {
                let safeC = c.replace(/'/g, "\\'");
                let isCorrect = (c === item.a);
                html += `<button onclick="handleOption('${safeC}', ${isCorrect})" class="flow-pill w-full text-right ${currentLang==='en'?'text-left':''}" style="justify-content: ${currentLang==='en'?'flex-start':'flex-start'}; border-radius: 8px;" dir="${currentLang==='en'?'ltr':'rtl'}">${getLocalizedText(c, currentLang)}</button>`;
            }
            html += `</div>`;
            setTimeout(() => { printBotMessage(html, false); }, 600);
        }

        window.handleOption = function(selected, isCorrect) {
            addUserMessage(getLocalizedText(selected, currentLang));
            const typing = showThinking();
            
            setTimeout(() => {
                typing.remove();
                if(isCorrect) {
                    quizScore++;
                    printBotMessage(`✅ <strong>${currentLang==='ar'?'إجابة صحيحة!':'Correct!'}</strong> 👏<br><span class="text-xs text-[#32D74B]">${quizScore}/${quizAttempts+1}</span>`, false);
                } else {
                    let msg = currentLang === 'ar' ? 'الجواب الصحيح:' : 'Correct Answer:';
                    printBotMessage(`❌ <strong>${currentLang==='ar'?'إجابة خاطئة.':'Incorrect.'}</strong><br><br><span class="bg-[#1a1a1a] p-2 rounded block border border-[#333]">${msg}<br>${getLocalizedText(quizPool[quizAttempts].a, currentLang)}</span><br><span class="text-xs opacity-70">${quizScore}/${quizAttempts+1}</span>`, false);
                }
                quizAttempts++;
                setTimeout(() => { askQuestion(); }, 2000);
            }, 800);
        }

        function finishQuiz() {
            let pct = (quizScore / quizAttempts) * 100;
            let msg = pct >= 96 ? uiText[currentLang].excellent : (pct >= 80 ? uiText[currentLang].good : uiText[currentLang].fail);

            let finalHtml = `${msg}<br><br><div class="bg-[#1a1a1a] border border-[#333] p-4 text-center text-xl font-bold rounded-xl">${quizScore} / ${quizAttempts} (${Math.round(pct)}%)</div>`;
            
            endQuizState();
            printBotMessage(finalHtml, false);
        }

        // --- 7. ADMIN DASHBOARD ---
        function openAdminPanel() {
            populateAdminData();
            document.getElementById('admin-modal').classList.remove('hidden');
            document.getElementById('admin-modal').classList.add('flex');
        }

        function closeAdmin() {
            document.getElementById('admin-modal').classList.add('hidden');
            document.getElementById('admin-modal').classList.remove('flex');
            
            // If they are admin but want to try the app, send them to menu
            if(document.getElementById('main-app').style.opacity === '1' && document.getElementById('chat-box').innerHTML === '') {
                showMenu();
            }
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.admin-content').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            populateAdminData();
        }

        function populateAdminData() {
            // 1. Users Tab
            let users = getDB('zbibo_users');
            let uList = document.getElementById('users-list');
            if(users.length === 0) {
                uList.innerHTML = `<p class="text-white/50 text-sm">No users logged in yet.</p>`;
            } else {
                uList.innerHTML = users.map(u => `
                    <div class="bg-black/30 border border-[#BF5AF2]/20 p-4 rounded-xl flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-[#BF5AF2]/20 flex items-center justify-center text-[#BF5AF2]"><i class="fa-solid fa-user"></i></div>
                            <div>
                                <p class="text-white font-bold">${u.name}</p>
                                <p class="text-[10px] text-white/50">Last seen: ${u.lastSeen}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // 2. Custom Questions Tab
            let customQs = getDB('zbibo_customQs');
            let qList = document.getElementById('custom-q-list');
            if(customQs.length === 0) {
                qList.innerHTML = `<p class="text-white/50 text-sm italic">No custom questions added.</p>`;
            } else {
                qList.innerHTML = customQs.map((q, idx) => `
                    <div class="bg-black/30 border border-white/10 p-4 rounded-xl relative group">
                        <p class="text-white text-sm mb-2 opacity-80" dir="auto">${q.q}</p>
                        <p class="text-[#BF5AF2] font-bold" dir="auto">${q.a}</p>
                        <button onclick="deleteCustomQuestion(${idx})" class="absolute top-2 right-2 text-red-500 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `).join('');
            }

            // 3. History Tab
            let history = getDB('zbibo_history');
            let hList = document.getElementById('global-history-log');
            if(history.length === 0) {
                hList.innerHTML = `<p class="text-white/50 text-sm italic text-center py-10">No chat history available.</p>`;
            } else {
                hList.innerHTML = history.map(h => `
                    <div class="border-b border-white/5 pb-3">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[#BF5AF2] font-bold text-xs"><i class="fa-solid fa-comment-dots mr-1"></i> ${h.name}</span>
                            <span class="text-[10px] text-white/40">${h.time}</span>
                        </div>
                        <p class="text-white/80 text-sm" dir="auto">${h.query}</p>
                    </div>
                `).join('');
            }
        }

        window.saveCustomQuestion = function() {
            let q = document.getElementById('new-q').value.trim();
            let a = document.getElementById('new-a').value.trim();
            if(!q || !a) return alert("Please fill both Question and Answer fields.");
            
            let customQs = getDB('zbibo_customQs');
            customQs.push({q: q, a: a, options: []}); // Options array empty so it auto-generates choices in quiz
            setDB('zbibo_customQs', customQs);
            
            document.getElementById('new-q').value = '';
            document.getElementById('new-a').value = '';
            populateAdminData();
        }

        window.deleteCustomQuestion = function(index) {
            let customQs = getDB('zbibo_customQs');
            customQs.splice(index, 1);
            setDB('zbibo_customQs', customQs);
            populateAdminData();
        }

        // --- UTILS ---
        function scrollToBottom() { const box = document.getElementById('chat-box'); box.scrollTop = box.scrollHeight; }
        function addUserMessage(text) {
            const box = document.getElementById('chat-box');
            let dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            let bRadius = currentLang === 'ar' ? 'border-bottom-left-radius: 16px; border-bottom-right-radius: 4px;' : 'border-bottom-right-radius: 16px; border-bottom-left-radius: 4px;';
            box.innerHTML += `<div class="msg-bubble msg-user" style="${bRadius}" dir="${dir}">${text}</div>`;
            scrollToBottom();
        }
        function showThinking() {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            let bRadius = currentLang === 'ar' ? 'border-bottom-right-radius: 16px; border-bottom-left-radius: 4px;' : 'border-bottom-left-radius: 16px; border-bottom-right-radius: 4px;';
            div.className = "msg-bubble msg-bot typing-indicator";
            div.style.cssText = bRadius;
            div.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
            box.appendChild(div);
            scrollToBottom();
            return div;
        }
        function printBotMessage(html, appendHelp) {
            const box = document.getElementById('chat-box');
            let dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            let bRadius = currentLang === 'ar' ? 'border-bottom-right-radius: 16px; border-bottom-left-radius: 4px;' : 'border-bottom-left-radius: 16px; border-bottom-right-radius: 4px;';
            let helpTxt = currentLang === 'ar' ? "<br><br><span class='text-[11px] opacity-50 block mt-2'>هل أستطيع مساعدتك بأي شيء آخر؟</span>" : "<br><br><span class='text-[11px] opacity-50 block mt-2'>Anything else I can help with?</span>";
            box.innerHTML += `<div class="msg-bubble msg-bot flex gap-3" style="${bRadius}" dir="${dir}">
                <div class="shrink-0 pt-1 text-[#8A2BE2]"><i class="fa-solid fa-robot"></i></div>
                <div class="w-full">${html} ${appendHelp ? helpTxt : ''}</div>
            </div>`;
            scrollToBottom();
        }

        document.getElementById('chat-input').addEventListener('input', e => { document.getElementById('send-btn').disabled = e.target.value.trim() === ''; });
        document.getElementById('chat-input').addEventListener('keypress', e => { if(e.key === 'Enter' && !document.getElementById('send-btn').disabled) handleInput(); });
    </script>
</body>
</html>
